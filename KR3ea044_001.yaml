body:
  text: 上卷人身陰陽西醫謂造化主惠育群黎所謂造化主即天地之神也與中國人本天地之中以生之義不謀而合但語言文字略不同耳茲且舉天地生人之理先注明之天地只此陰陽化生五運六氣人身秉此陰陽乃生五臟六腑夫自古通天者生之本本於陰陽凡人未生之前男女媾精而成此胎孕即本天地水火之氣而交媾也既生之後鼻息呼吸得天之陽以養氣飲食五味得天之陰以養血是未生之前既生之後皆無不與天相通而所以相通之故則以人身之陰陽實本於天地之陰陽而已西洋化學言人吸空中養氣而活所謂養氣即天陽也至於飲食五味不知是地之陰質雖西醫書先有博物一篇而未將陰陽兩字分晰究不得其主宰陰者藏精而起亟也陽者衛外而為固也人身之陰陽互為功用陽無陰則亡陰無陽則脫陰主藏精於內而陰中之氣乃常亟起以應乎外有如皮膚在外屬陽而在內之血液必達於皮膚以為毛為汗氣出口鼻為陽而在下之水津必出於孔竅以為津為液此即亟起應陽之一端也又亟與極通陰精生陽氣如太極之動而生陽也故曰起亟陽者陰之衛也有陽衛於外而陰乃固於中譬之女子之胎內有血衣是陰也其外先有水衣包之水衣包血衣此即陽衛於外陰乃得固之義又如傷寒邪入皮毛繼乃傳經入里蓋因陽不衛外是以陰不能固於其內此可見陰陽交互之理言人之陰陽則外為陽內為陰言人身之陰陽則背為陽腹為陰言人身臟腑中陰陽則臟者為陰腑者為陽就人渾而論之則在外者皮肉筋骨皆屬陽在內者五臟六腑皆屬陰若就人身分而論之則背象天覆為陽督脈統之而太陽經全司之腹象地載為陰任脈統之而太陰經全司之再以臟腑分論之則五臟主藏為陰六腑主瀉為陽夫外為陽而有腹背之陰陽者陽中有陰陽也內為陰而有臟腑之陰陽者陰中有陰陽也人必先明天地陰陽之理而後知人身之氣化西醫剖割視驗人之背面前面左右內外層折詳矣而不能將各層分出陰陽則上知其形不知其氣以所剖割只能驗死尸之形安能見生人之氣化哉此節生氣通天論金匱真言論文合為一章以為醫理之大源也五臟所生天有五氣地有五行人本天地之中以生而有五臟臟者藏也藏天地之精氣所以成其形而為人也故欲知人身之陰陽須先知五臟之氣化東方生風東方於卦為震於時為春陽氣發動而陰應之遂生風氣風氣者乃天春生無形之氣也西洋天學言空氣有冷熱相吸而成風夏月熱帶在北則風從南至冬月熱帶在南則風自北來內經所謂東方當南北之間是西洋言風之往來內經則風所從生南北是陰陽兩殊故風從此異東方是陰陽交應故風從此生內經探生風之源比西洋更精風生木由無形之五氣生有形之五行春氣所生為甲乙木西洋格致皆以草木有根芽子核而生然當天地開闢實有風氣而後化生草木即以芽核論之仍是秉風氣所生蓋地土陰質得發動之陽氣即風氣也邵康節所謂地下有雷聲春光彌宇宙是矣既萌芽後則感受空中之風而天又有風星以司其氣化雖西洋有引土膏吸炭氣之説亦只是火來就木水來生木而究木之體則總屬風氣蓋在天則木本風化而在人則肝為風臟木生酸有木之形即有性味木之味酸故凡果實味皆帶酸變酒為醋亦只是風氣釀成酸生肝五氣五行亦既朕兆而成性味矣然後人得秉之而生五臟秉風木之氣所生則為肝臟焉蓋人所以日食五味者藉以生養五臟也酸味入腹則生養肝臟焉子孕母腹中亦賴母所食五味合之氣血以生五臟南方生熱南方正當赤道於卦為離陽氣外發是生熱氣即西洋所謂熱帶日行赤道生熱也故日為衆陽之精熱生火熱者夏之令也夏氣所生於地之五行為丙丁火熱是無形之天氣火是有形之地氣故河圖之數地二生火西洋化學言以鋼擊石所生之熱與鋼鐮磨下石屑與空中養氣化合而燃鑽木相磨亦與空中養氣化合而燃即內經熱生火之證火生苦凡物經火味無不苦蓋火之性使然也草木秉火之性者其味皆苦另詳性味篇苦生心生人秉火之性味於是而生心臟與酸生肝義同中央生濕中央陰陽交會之所陰屬水陽屬火水火交會而生濕氣為長夏之令以化生萬物央者陰陽二字雙聲合為一音也蓋天陽地陰下下相交南熱北寒水火相交遂蒸為濕西洋言談養炭輕四氣瀰漫地球而古聖只以中央二字已賅其義濕生土濕氣無形化生有形為戊己土土之生物全在於中含濕氣也西洋言土即是地不知古聖卻有分別天是陽在上地是陰在下而土在陰陽相交之中央也西洋言土是物質腐爛而成而不知所以腐爛皆借濕氣土生甘土之味本淡而所生五穀則味甘故甘者土之性味也西洋但知現成之五味而不知五味所自生故其論藥多誤甘生脾人秉土之性味於是而生脾臟西方生燥西方主秋金之氣收斂肅殺其氣為燥在一日為申酉日入之時陰收陽斂氣澤消滅致成燥氣在一刻為秋令收斂肅殺所以成物賴此燥氣也西洋化學不知燥氣因此為水火消耗之氣不能以器取得故不知也燥生金有此無形之燥氣乃生有形之金於地之五行為庚辛金秋日燥氣用事則草木黃落即是生金之驗土之所以生金者亦以其由濕返燥凝而成質也金生辛有燥金之氣性然後生此辛味辛生肺人秉金之性味於是而生肺臟所以藏天地之金氣也北方生寒北方主冬令生寒氣熱帶在南冷帶在北故西洋有北冰海之説寒生水氣以生形寒氣所生為壬癸水西洋謂水是輕養氣所化獨內含輕氣以冷玻璃罩之則與空中養氣化為水珠然必罩以冷玻璃仍從冷而化也又云將二氣放水銀盆內燒之復化為水水銀極寒是與內經寒生水之義亦合水生咸寒水之性其味為咸咸生腎人生秉寒水之性味而生腎臟以司人周身之水人生本天親地故生此五臟以應天地之陰陽必先知人之五臟本於五行然後發之為百骸推之為萬物莫不本於五行焉五行之氣偏則為病草木各得五行之氣藉以調五臟之偏藥之功用以著設非先明五行之理不可以言醫也故引素問陰陽應象論文以明之西洋天學化學雖與中國五行之説不同而義實相通惟西洋醫學則止就人身形質立論不知人之氣化實與天地同體也五臟所屬五臟秉於五行凡秉五行之氣而生者皆以類相屬推其類可盡天地之物知所屬乃明形氣所歸而病之原委藥之宜忌從可識矣肝舊説七葉居左脅下非也西醫云四葉後靠脊前連膈膜膽附於肝之短葉間膈即附脊連肝從肝中生出前連胸膛肝體半在膈上半在膈下實不偏居於左謂肝居左者不過應震本東方位自當配在左耳醫林改錯言肝系後著脊前連胃名為總提上有胰子總提內有行水管為胃行水西醫言肝無所事只以回血生出膽汁入腸化物二説言肝行水化食不過內經肝主疏泄之義而已至肝系之理尚未詳言按肝繫上連心包絡故同稱厥陰經繫著脊處則為肝俞穴系循腔子一片遮盡是為膈膜肝系下行前連腹中統膜而後連腎系為肝之根通身之膜內連外裹包肉生筋皆從肝系而發舊説言肝居左西説言肝居右然其系實居脊間正中至診脈分部左右亦從其氣化而分非以形而分也在天為風震巽主氣在天為風人秉天之風氣而生肝臟以司周身之風故凡風病以肝為主在地為木本天無形之風氣生有形之木肝實秉風木之氣所生解得二字便知肝之氣化在體為筋筋連於骨蓋骨屬腎水筋屬肝木乃水生木之義以應天甲乙之象究肝生筋之迹實由肝膈連及周身之膜由膜而連及於筋也西醫剖視見白膜包裹瘦肉而兩頭即生筋也然彼但言筋之體未言筋之根惟內經以筋屬肝是從肝膈而發出膜網然後生筋若不尋出筋之源頭則筋病不知治法在色為蒼微青微黃皮色老潤乃蒼正色其肝無病若青勝黃則肝寒若黃勝青則肝熱西人不講五行故不知氣色相應之理在音為角角為木音和而長知肝無病西洋聲學言弦管甚詳然不能分出五音六律則察理未精在聲為呼叫呼也肝氣太勝和長之音變為叫呼狂譫之類是也宜抑其肝在變動為握支節運動皆筋所主而手尤顯然故筋之變動則發為握寒則拘急熱則縮攣風火閉結則握拳透爪搐搦瘈瘲皆筋之變在竅為目肝脈交顛入腦由腦而通於目故肝開竅於目肝藏魂晝則魂遊於目而為視夜寐則目閉魂復返於肝西醫剖割眼珠極贊重疊細絡之妙受光照察之神然試問醒開寐閉黑子瞳子之所由生則不知也又使無神水而欲其受外光能乎惟心火腎水交會於腦合肝脈注目中肝者心之母腎之子故並二臟之精而開竅於目西醫之精能將斜目修削使正然不久仍斜不知病源剖割何益哉在味為酸木之本味也木得寒濕之氣則化而為酸如菜入壇醃則酸是矣木得濕熱之氣則變而為酸如麩得糟曲則酸是矣吐酸亦分寒熱二證寒酸吐清冷熱酸帶腐臭其液為淚目為肝竅故淚為肝液其華在爪爪是筋之餘肝主筋故其華在爪其臭為臊食草木各禽獸皆有臊臭秉木之氣故也五臭之辨精矣西人不知其谷為麥麥為芒谷秉東方勾萌之木氣故麥牙能疏肝仲景治除中病以蒸餅試之取木剋土也其畜雞巽為雞木畜也故仲景用雞矢治轉筋取其為肝去風也五常政論以犬屬肝木之畜又是一義其蟲毛大而虎豹小而毛蟲皆風木之氣所生故肝病癲癇或作虎豹之狀又有病遍體生毛者西醫五種有博物新篇圖畫獅象小蟲毫芒畢具然不知屬風木之所生則於醫理物理不能推到造化根源也其數八河圖三為木之生數八為木之成數五行之數理極精微非西人所得知也數起於一者初也始也混沌初開惟水先有故曰天一生水然水氣初生而未成也必待火木金土之氣皆生水得兼借其氣而後成故歷二三四五至於六數水乃成焉火則繼水而生故地二生火亦成於水之後故天七成之水火之氣已具乃化生木故天三生木地八成之四九金五十土其理一也生於陽者成則為陰生於陰者成則為陽聖人於生成之次序而以數紀之又以其數之陰陽而於物驗之神矣其果李仲景用李根皮郁李仁皆治肝也一行之中又各分五行故果雖同是木實而又各屬五臟其菜韭得春氣最先故屬木韭根止血能行肝氣故也韭子治遺精溫斂肝氣也心形圓上闊下尖周圍夾膜即包絡也其上有肺罩之空懸胸中其下有膈膜遮截膈為膻包絡為膻中心為君主西醫云有腦氣筋貫之有左右房以生血回血又按心之脈絡從包絡中發出以達於周身故包絡為臣使之官西醫言心內分左右四房皆有管竅為生血回血之用血受炭氣則紫回行至心右上房有一總管接回血入心中落右下房又一總管運血出而過肺被肺氣吹去紫色遂變純赤還入心之左上房落左下房又有一總管運血出行遍於周身回轉於心此即內經營衛交會於手太陰肺及心主血脈之説也在天為熱夏令南方離火主氣是為熱也在體為脈心生血乃秉火氣之化故血色赤脈者血之道路也脈經云脈為血府西醫云心房動跳不休周身之脈皆應之而動醫林改錯謂脈是氣管非也觀仲景復脈湯全補心血可知之矣在色為赤火之色見於皮里如以縞裹朱心血足也若赤斑麻疹皆是心火太甚西洋化學言紅色中多養氣又言養氣能燃即內經火之色赤之義在音為徵音和而美其舌抵齒在聲為笑心志喜故發聲為笑在變動為憂喜之變也心火宣明則喜心火鬱閉則憂西人但知憂喜笑怒人有此當然之情而所以成此情者西人不知在竅為舌心之脈管從肺系以上於舌而辨五味在味為苦物經火煅其味皆苦然苦雖是火味實則火之餘氣也故凡味苦者均能瀉火在志為喜心火宣明故喜其液為汗汗乃膀胱化水之氣透出皮毛者也故凡汗均歸太陽經因小腸為心之府與膀胱同是太陽經同附著於連網之上心火宣布由小腸連網併合膀胱是為火交於水乃能化氣外達而為汗故仲景無汗用麻黃有汗用桂枝二方均主桂枝以宣心陽也此所以汗為心液西洋醫法不知汗之源也其榮為色血足故也其臭為焦凡物火灼其氣皆焦其數七河圖二為火之生數七為火之成數其谷黍色赤性溫故為心之谷其畜馬天之大火星為心又名天駟房駟之精下則化為馬故馬為火畜金匱真言云其畜羊然以馬為義長其蟲羽羽族應南方朱鳥之象西洋格致言鳥肉多縫隙使養氣充滿則輕靈善飛養氣能燃火則知羽族秉火氣多矣其果杏夏之果故屬火杏仁苦降雖是肺藥實以火制金之義也其菜薤氣辛溫葉不沾水秉火氣所生者也仲景用治胸痹以其能宣心陽也脾居中脘圍曲向胃西醫云傍胃處又有甜肉一條生出甜汁從連網入小腸上口以化胃中之物脾內有血管下通於肝余按脾居油膜之上與各臟相通其血氣往來之道路全在油膜中也中國醫書無甜肉之説然甘味屬脾乃一定之理西醫另言甜肉不知甜肉即脾之物也又按仲景越脾湯是發散肌肉脾約丸是滋潤膏油蓋脾臟生內之膏油從內膏油透出於外是生肌肉然則外肌內膏皆脾之物也西醫言脾中之血壅熱氣以薰化水谷蓋血即心火所生壅生熱以化谷者火生土之義也至於脾土製水之説西醫不知言水入口散出於胃走連網中不知連網上之膏即脾之物膏滑故水利醫林改錯言脾中有管名玲隴宮水從胃透入此管遂下走雞冠油中也余按脾與胃相連處有膜一條其中有管自然無疑脾質凝血而成西醫言脾中有血管回血聚於脾中者極多余按血是心火所生火生土故統血極多食入則脾擁動熱氣以化之西醫又言有甜肉汁化谷按甜肉即胰子也生於油上凡膏油皆脾所生之物膏能化水胰子能化油脾稱濕土正指胰子與膏也有此滑潤故腸中通利而物化宋元后圖脾居於右西醫圖居於左考淮南子已有脾左肝右之説但脾之應脈實在右手蓋其功用實歸於右也在天為濕長夏之令陰陽交會是生濕氣在地為土濕氣所化於五行為土凡物濕漬皆化為土而土中又常含濕氣也在體為肉此肉字兼肌言之肌是肥肉肉是瘦肉人身肥肉包瘦肉外之肥肉又由腔內之油膜透達而生者也脾生油膜之上脾氣足則油多而肥膜上之油即脾之物也在內為膏油在外為肥肉非兩物也油膜中有赤脈屬脾血分脾之血足則此赤脈由內達外是生瘦肉蓋土是天地之肉脾亦應之而生肌肉在色為黃黃為中央之土色凡人面黃明潤為無病發黃為濕病在脾也在音為宮聲大而和其舌居中在聲為歌脾主思思而得之則發為歌癲狂自歌脾絶亦歌在變動為噦脾氣逆滿吐聲不吐物也與噫厄略同非痰即血之所致在竅為口口通五臟然主於納穀先通於胃而胃實脾之腑也故口亦是脾之竅凡百體皆有專屬者有兼屬者西醫圖口通腦通心肺通胃而不通脾不知胃乃脾之腑不通脾而反屬脾竅則其歸屬有真主宰矣內經精確如此真中外所不能及在味為甘西醫云甜肉汁入腸化物蓋甘者土之本味也故甘味均能補脾太甘則又壅脾氣而為病在志為思脾主運用故其志在思而思慮又轉傷脾在液為涎五液皆腎所主之水也脾土不能制水則水濕而為涎脾寒者其涎清冷脾熱者其涎稠黏其榮為唇口為脾之竅唇又為口之門戶故脾之氣血沖和則唇明潤脾熱者唇枯脾絶者唇縮唇不與脾連而脾榮卻見於唇西醫之拘於形迹者斷不能知其臭香甘味所發其氣為香木香之類所以入脾其數五河圖十為土之成數五為土之生數居五行之中茲故獨舉中五以立言其谷稷味甘入脾即北地小米之大而黃者其畜牛黃牛也鳴中宮音本草言牛乳益脾忌酸味因牛屬土酸屬木故不相宜義可類推其蟲倮如蚯蚓是秉土之精能化毒以利水其果棗味純甘土之果補脾多用之其菜葵即冬葵秉土濕氣所生故滑潤土能制水故冬葵子能利小便肺西醫言肺覆而盂前兩葉包心在後有峽及肺根此根即氣管肺脈連網等包裹肺衣而成每肺外有衣薄而通明包肺四面肺有縮力每葉藏氣管氣管之末為氣泡肺脈至氣泡而散即包氣泡功用主呼吸也此説於肺衣氣泡頗能詳明宋元后不知肺之功用全在衣與泡也舊云八葉非也西醫云五葉右三左二披離下垂後附脊骨前連胸膛肺中有管竅通於膈膜而下達氣海肺質輕鬆外有膜沫濡潤以助呼吸在天為燥在天為收斂肅殺秋燥之氣故經秋則草木焦枯感燥氣也在地為金燥氣所生於地之五行為庚辛金人之肺臟實秉燥金之氣而生者也在體為皮毛肺金乾象其體如天天包於地之外皮毛包於人身之外故皮毛屬肺肺多孔竅皮毛盡是孔竅所以宣肺氣使出於皮毛以衛外也西醫剝皮觀而知人何處皮厚何處皮薄然不知皮為肺之所司言毛孔能傳人之熱外出而不知是太陽衛外之陽也在色為白金之本色人面白而明潤者肺無病白如枯骨者死慘白者失血以肺主氣但見肺之色是氣多而血少也在音為商西方金音口張聲揚在聲為哭商聲也主秋令發哀傷之聲故哭在變動為咳肺主氣氣逆而搶上故咳有痰火忤犯而咳者有寒飲閉滯而咳者在竅為鼻氣管總統於肺而上通於鼻以主呼吸在味為辛金之性烈故味辛細辛薄荷之類是也若大辛者又秉金斂火速之性主下行以溫肝腎桂附是也在志為憂肺主斂憂則氣斂在液為涕涕出於鼻故為肺之液肺有寒則涕自出有火則無涕其榮為毛肺主皮毛故肺腴則皮毛榮也其臭為腥魚為水族兼秉金氣故其臭皆腥其數九河圖四為金之生數九為金之成數其谷稻秋熟皮黃米白故屬金其畜狗説文云叩氣發聲故名狗肺主氣狗能叩氣故屬肺金之畜其蟲介鎧甲之象屬金鱉甲山甲均能破肝以其秉金氣能攻制木也其果李按李既屬肝此當以梨配之五常政論作桃其菜韭韭色白亦可屬肺然其得春氣為多總宜屬肝秉金氣者不止此藥古人以此屬肺亦只示人以端倪非謂此外更無其物又以見一物不止一義耳腎形如豆又似豬腰子腎中有油膜一條貫於脊骨是為腎系此係下連網膜又有氣管由肺而下附脊循行以下入腎系而透入網膜達于丹田兩腎屬水中間腎系屬火即命門也命門為三焦膜油發源之所故命門相火布於三焦焦即油膜也舊説多誤西醫析言之而不能會通也詳考內經自見腎靠脊而生有膏油遮掩附腎有薄膜包裹西醫名為腎衣此衣發於腎系乃三焦之源也腎系是白膜層疊結束而成一條貫脊系中內竅通脊髓最深之竅也其次為氣管外通於鼻以吸天陽下入丹田為生氣之根又其次為溺竅水入胃散膜膈中以入腎系合為溺竅透入下焦乃及膀胱西醫但言氣管溺管而不知化精通髓尤有一管名曰命門者水中之陽外通天氣為生命之根源也內經未言溺過腎中然謂三焦為水道膀胱為水府腎為三焦膀胱之主其司溺從可知矣在天為寒北方冬令陽氣內斂陰氣交互是為寒氣在地為水寒氣所生於卦為坎於五行為水在體為骨腎秉寒水之氣主蟄藏受五臟之精而藏之化髓生骨小兒髓不足故頭骨未合老人腎虛故骨痿也西醫將人骨骼照印入書長斷大小圓鋭曲折盡其形矣然不知是腎之所生彼以骨中有髓知為腦髓生骨而不知並腦髓皆腎所生也余識西醫潘某中國人而為外國醫士者也其妻死即用洋藥化去尸肉存枯骨置之藥房以備考校此於接骨檢驗詢為有益於內證毫無補裨存其骨而不知骨所自生遷可笑矣在色為黑水之色也黑而慘淡者水泛土衰黑如煙煤者水枯腎竭五行之理成功者退五色亦然黑轉青則黑退青轉紅則青退爛布造作洋紙腐化全帶黑色若欲退其黑色用品藍入則黑退然紙成後內存品藍性久則變出青色必再加品紅水則青色退盡永不變藍色矣是可見五行退卸之理在音為羽其音低細在聲為呻呻伸也腎氣在下故聲欲太息而伸出之在變動為栗戰栗寒貌老人陽虛往往寒戰在竅為耳陳修園謂腎脈不上頭腎與心交假心小腸之脈入耳為聽宮其説迂曲豈有腎自開竅而無路上頭之理蓋腎主腦髓耳通於腦路甚直捷所以腎開竅於耳也西人稱耳深處之穴曰耳鼓箱有薄翳蓋之氣搏則動下有細骨如干傳其動於穴底耳翳接細絡如琴瑟之有弦稀密拉放以外音傳於腦則耳亦琴也巧妙之至西人此説精矣然不知耳是腎竅不知司聽者是何物也蓋髓為精神所會而竅通於耳故能辨聲音聲氣二者皆空虛無形然聲速於氣氣已至則可呼吸而入口聲已至不能招收而得西學言空氣布滿天地凡聲音者是擊動空氣而成也據此則耳之辨音亦以耳竅內之氣為外空氣擊動故聲傳入耳腎者生氣之源而髓則腎精所化則髓中之氣尤至靈氣也故外空氣傳聲動之則應又聽有遠近明暗之分則久視乎髓中之氣有優劣也西學尚未談到此在味為咸洪範曰潤下作咸水之味也藥如蓯蓉等皆入腎在志為恐腎存志為作強之官腎虛不能作強則為恐矣在液為唾腎絡上貫膈入肺系系舌本舌下廉泉玉英穴出液之道也腎液上泛則為唾其榮為發發雖血之餘實則血從氣而化外達皮毛上至顛頂而生髮也氣乃腎水之生陽由太陽經而達於外以上於頭血在血室之中得腎氣之化外達則為皮毛上行則生頭髮血室氣海是二是一皮毛頭髮並非二物所以發名血餘而又為腎水之榮也故烏鬚髮之藥皆補腎其臭為腐凡物入水無不腐化故水之臭腐其數六河圖一為水之生數六為水之成數其谷豆黑豆也其性沉其色黑故屬腎水其畜豕豕也色黑屬亥為水之畜其蟲鱗魚龍皆水中之陽物也故鯉魚湯利水龍骨鎮腎氣皆從其類之義其果栗色黑根不亡本故屬腎水其菜藿古藿即豆苗葉天地之大不外五行人稟天地而生五臟推之於物各稟五行因皆與人之五臟相屬能知五行變化之理則於病藥自然會通故節録金匱真言臟象論等文合為一章以見大概五臟所藏人之所以靈於物者以其秉五行之秀也夫此靈秀之氣非空無所寄而已實則藏於五臟之中是為五臟之神人死則其神脫離五臟人病則五臟之神不安知五神之所司而後知五病之情狀心藏神人所以有知覺神主之也神是何物渾言之則兩精相搏謂之神空言之則變化不測謂之神此皆放言高論未能實指之也吾且為之實指曰神乃生於腎中之精氣而上歸於心合為離卦中含坎水之象惟其陰精內含陽精外護心臟之火所以光明朗潤而能燭物蓋神即心火得腎陰濟之而心中湛然神明出焉故曰心藏神心血不足則神煩心火不足則神怯風痰入心則神昏也西醫知心為生血回血之臟而謂心不主知覺者主知覺者是腦髓筋又言腦後筋只主運動腦前筋主知覺又言腦筋有通於心者彼不知髓實心之所用而非髓能知覺也蓋髓為水之精得心火照之而光見故生知覺矣古文思字從囟從心即以心火照腦髓之義髓如月魄心如日光相照為明此神之所以為用也肝藏魂魂者陽之精氣之靈也人身氣為陽血為陰陽無陰不附氣無血不留肝主血而內含陽氣是之謂魂究魂之根源則生於坎水之一陽推魂之功用則發為乾金之元氣不藏於肺而藏於肝者陽潛於陰也不藏於腎而藏於肝者陰出之陽也晝則魂遊於目而為視夜則魂歸於肝而為寐魂不安者夢多魂不強者虛怯西醫不知魂是何物故不言及於夢然西人知覺與華人同試問彼夜寐恍惚若有所見者是何事物因何緣故則彼將啞然蓋魂非剖割所能探取而夢非器具所能測量故彼不知也肺藏魄人身血肉塊然陰之質也有是質即有宰是質者秉陰精之至靈此之謂魄肝主血本陰也而藏陽魂肺主氣本陽也而藏陰魄陰生於陽也實指其物即肺中清華潤澤之氣西醫所謂肺中只有膜沫是也惟其有此沫則散為膏液降為精血陰質由是而成矣魂主動而魄主靜百合病慌惚不寧魄受擾也魔魘中惡魄氣所掩也人死為鬼魄氣所變也凡魂魄皆無形有象變化莫測西醫剖割而不見遂置弗道夫談醫而不及魂魄安知生死之説哉脾藏意舊注心之所憶謂之意心火生脾土故意藏於脾按脾主守中能記憶也又主運用能思慮也脾之藏意如此脾陽不足則思慮短少脾陰不足則記憶多忘腎藏志舊注心之所之謂之志神生於精志生於心亦心腎交濟之義按志者專意而不移也志本心之作用而藏於腎中者陽藏於陰中也腎生精為五臟之本精生髓為百骸之主精髓充足伎巧出焉志之用也又按志即古志字記也事物所以不忘賴此記性記在何處則在腎經益腎生精化為髓而藏於腦中凡事物經目入腦經耳入腦經心亦入腦腦中之髓即將事物印記不脫久之要思其事物則心一思之而腦中之事物立現蓋心火陽光如照相之鏡也腦髓陰汁如留影之藥也光照於陽而形附於陰與心神一照而事記髓中同義西學留影妙矣而西醫則不知人身自有照影留聲記事之妙質雖剖割千萬人能得此理否古思字從囟從心囟者腦前也以心神注囟則得其事物矣內經又有五臟七神之説云脾藏意與志腎藏精與氣與此不同然志須屬腎精氣血三者非神也另條詳注不在此例故從五神之説為是五臟所主此條先言所合言本臟之內外相合也後言所主明其相制相成也心之合脈也西醫云心有運血管回血管外則散達周身內則入於心中心中有上下四房以存血心體跳動不休而周身血管應之而動是為動脈此説極是脈經云脈為血府即此之謂也醫林改錯謂脈是氣管非血管言氣乃能動血不能動夫果是氣管則隨氣呼吸一呼止當動一至一吸止當動一至何以一呼動二至一吸動二至顯與氣息相錯哉是脈非氣管其應心而動為無疑矣故云心之合脈也西醫言脈不足為診具足見西醫之粗淺也脈診兩手始於內經詳於難經事確理真非西人器具測量所能得也詳下榮衛生會及診脈精要篇其榮色也心主血血足則色華血脫則色枯其主腎也五行之理相生相制制則生化心是火臟而受制於腎水是腎乃心臟生化之主故其主腎也心為離火離卦中之陰爻即含坎水之象也心之所以生血亦以水交於火即化為血另詳氣血條惟其以水濟火而火之功用乃成故心血虛者必兼補腎水觀天王補心丹仲景復脈湯均用地黃其義可知肺之合皮也肺為乾金體高而大如天之無不覆氣達於外以衛周身如天之無不包故合於皮毛西醫云周身氣管外則散為毛竅內則總統於肺故肺合皮毛凡是外感無不治肺也西法用數百倍顯微鏡照見毛形如樹其下有坑坑內有許多蟲或進或出其實皆氣之出入也蓋肺主行氣肺中盡是氣孔鼻者直出之孔毛者橫出之孔鼻氣大故人皆知之毛孔之氣細故人不知實則鼻氣一出則毛孔之氣俱出鼻氣一入則毛孔之氣俱入中國人不知皮毛與肺相連皆是從毛竅相通也其榮毛也毛者血之餘也然實則血從氣化而生焉氣生於水先天真氣名天癸水女子以血為主氣從血化故水化為血內行下達則為月信男子以氣為主則血從氣化故血化為水上行外達則生須與毛另詳氣血條毛榮者氣化之盛也肺主氣故其榮在毛其主心也天之五行火西流而後能秋地之五行火剋金而後成器人之五行心火溫肺而後胸中陽和無寒飲咳痹之證故心火者乃肺之主也心火太甚則肺燥心火不足則肺寒肝之合筋也筋象甲乙木故為肝所合人但知筋著於骨節間而不知筋實與肝通蓋肝中有大膈膜內連肥網外連皮膚凡有瘦肉皆有網膜包之凡肉之網膜其兩頭皆連於筋肝之氣即從內膈膜發為外之網膜由網膜而發為筋筋所以為肝之合也中醫但言其義未言其形今借西法指出迹象尤為確實合者相連之謂也凡瘈瘲筋抽皆是內膜伸縮收放因牽動其筋而然若不知筋所發生之源則不能治也其榮爪也爪為之筋余筋節柔和故其榮發見於爪其主肺也肝主血主清陽之氣必得肺金制之木不鬱而為火則清氣得升血脈和暢如金不能平木則肝火上升為痰咳虛癆失血等證脾之合肉也肉是人身之陰質脾為太陰主化水穀以生肌肉肌是肥肉肉是瘦肉肥肉是氣所生瘦肉是血所生脾生連網之上脾氣足則內生膏油透出於外則生肥肉脾血足則又從連網中凝結而生瘦肉亦由內生出於外肥肉包瘦肉者氣包血故也脾陽虛則肉浮脾陰虛則肉消脾生膏油從膏油而生出肌肉其形迹之相連最顯然也乃西醫剖割但淺割外皮其肉象如何深割內皮其肉象又如何究未知肌肉屬脾所以不得治法其榮唇也脾開竅於口唇乃口之門戶故其榮在唇凡病唇縮為脾絶不治其主肝也肝屬木能疏泄水穀脾土得肝木之疏泄則飲食化肝木之陽不升則為瀉泄肝寒則腹痛霍亂觀建中湯用桂枝溫肝即知其義肝火鬱則為痢亦是肝病纍脾故肝為脾之所主西醫謂肝生膽汁入胃化谷即內經木能疏土之義腎之合骨也骨內有髓骨者髓所生周身之骨以背脊為主腎系貫脊腎藏精精生髓髓生骨故骨者腎之所合也西醫支解人而視之詳言腦髓腦氣筋而不知髓是何物因不知腎與骨合所以其治多礙也其榮發也人之毛髮皆是血從氣化所生義詳五臟所屬條及本條其榮毛句但毛生於氣孔中屬肺金須生於唇乃任脈所終之地屬肝胃兩經而發則生於頭是督脈經與太陽經所交也太陽經從背上頭督脈經從脊貫頭太陽膀胱為腎之府督脈屬腎均交於頭血在丹田之內從氣之化循經而上生為頭髮故腎精足則其榮在發老人腎竭所以發白血從氣化之理詳天癸條其主脾也脾土能制水所以封藏腎氣也脾不統攝則遺精脾不制水則腎水泛而為痰飲張隱菴注六微旨論云土位之下風氣承之風位之下金氣承之金位之下火氣承之君火之下陰精承之亢則害承乃制制則生化故五臟所合言其相生也五臟所主言其相成也先心肺而後脾腎乃歸重於相成之義歟西醫不講五行分臟腑截然各別而於交通之故生成之理概不能知臟腑所合合者相合而成功也有臟以為體即有腑以為用臟之氣行於腑腑之精輸於臟二者相合而後成功故引靈輸本樞篇文以明之肺合大腸大腸者傳導之府肺為清金大腸為燥金肺藏魄而大腸肛門即為魄門肺與大腸交通之路全在肺系膜油之中由膜油以下達於大腸而大腸全體皆是油膜包裹雖大腸與肺一上一下極其懸遠而其氣從油膜之中自相貫注蓋肺極高大腸極下其形勢自足相臨手太陰肺經與手陽明大腸經又相表裡故相通也傳導之府謂傳導肺氣使不逆也凡大腸之病皆從肺來故大腸燥結須潤肺大腸痢證發於秋金之時亦是肺金遺熱於大腸然大腸病亦能上逆而反遺於肺傷寒論云下痢便膿血者其喉不痹不便膿血者其喉為痹蓋邪熱不從大便而瀉上壅於喉宜瀉大腸此大腸所以為傳導肺氣之府也宋元后圖大腸摺疊一團不能分出上中三回惟西醫言大腸頭接小腸下之闌門由右腹而上行為上回橫繞至胃下過左畔為橫回由左腹而下行為下回至胯乃轉為直腸凡人瀉利腹鳴可試其回轉之路也仲景云腹中轉夫氣者尚有燥屎仲景下一個轉字已繪出大腸之形而宋元后醫不之察反不如西醫之踏實小腸上與胃接為幽門全體皆與油膜相連甜肉汁膽汁皆從油膜中入小腸也心合小腸小腸者受盛之府手少陰心經與手太陽小腸經脈絡循行相為表裡小腸全體生連油膜上循肝膈透入胸中而為心包絡心與小腸交通處全從包絡透出下行達於油膜乃與小腸相通小腸受盛五穀使化精汁以上奉於心而化血故小腸為心之府心火不宣則小腸之糟粕不化是飧泄心火太甚則熱移小腸膜油中為熱所蒸飲水從油膜中過則被蒸為黃赤色痢證糟粕不化垢膩膿血全是心移熱於小腸之病又詳下受盛之官注肝合膽膽者中精之府內經云脾之與胃以膜相連耳謹按各臟腑遠近不一實皆以膜相連惟膽附於肝最為切近西醫言肝無能事只是化生膽汁而膽汁循油膜入胃則飲食之物得之乃化是中焦之精氣全賴於膽故膽者中精之府也膽屬火肝屬木膽汁為肝所化是木生火也膽汁化物是木能疏土也故經云食氣入胃散津於肝肝寒則膽汁不能化物肝熱則膽汁化物太過而發中消等證脾合胃胃者五穀之府脾居胃外以膜相連西醫云近胃處又有甜肉一條甜肉汁入胃則飲食自化豫按經文甘生脾是甜肉汁即脾之物也無庸另立條目脾主化谷胃主納穀是胃者脾之腑也胃為陽脾為陰納穀少者胃陽虛納穀多而不化者脾陰虛如膈食病糞如羊屎即是脾陰虛無濡潤之氣故燥結不化知脾陰胃陽乃知健脾胃之法李東垣重脾胃而方皆溫燥是但知胃陽而不知脾陰西醫言胃津化物甜肉汁化物膽汁化物則但主陰汁立論而又不明胃為陽主納穀之理皆偏也上曰賁門下曰幽門後面與肝膜相連前面與膈膜相連下與脾相曲抱脾生一物曰甜肉醫林改錯名為總提即胰子也胰子能去油西醫但言甜肉汁化谷而不知其化油也脾又生脂膏所以利水穀在胃中又賴脾土之濕升布津液以濡之然後腐變故胃但稱五穀之府不言化五穀以見胃主納脾主化一燥一濕互為工用腎合膀胱膀胱者津液之府也腎為水臟膀胱為水之府凡人飲水無不化溺而出於膀胱自唐以下皆謂膀胱有下竅無上竅飲入之水全憑氣化以出又謂水入小腸至闌門飛渡入膀胱無從入之路也故曰氣化醫林改錯深叱其謬西醫云水入於胃散走膜膈胃之四面全有微絲管出水水入膜膈走肝膈入腎系腎主瀝溺由腎系出下走連網膀胱附著連網溺入之口即在連網油膜中也中國人見牲畜已死膀胱油膜收縮不見竅道遂謂膀胱有下口無上口疏漏之至西醫此説誠足罵盡今醫然持此以薄古聖則斷斷不可蓋內經明言下焦當膀胱上口又言三焦者決瀆之官水道出焉內經所謂三焦即西醫所謂連網油膜是也故焦字從革焦從膲後人改省作焦乃不知為何物矣溺出膀胱實則三焦主之而膀胱所主者則在於生津液腎中之陽蒸動膀胱之水於是水中之氣上升則為津液氣著於物仍化為水氣出皮毛為汗氣出口鼻為涕為唾遊溢臟腑內外則統名津液實由腎陽蒸於下膀胱之水化而上行故曰腎合膀胱而膀胱為腎生津液之府也又詳下條膀胱與連網相接處即是入水道子宮在膀胱後男子名為丹田腎陽入丹田蒸水則化氣上行膀胱如釜中蓄水丹田如灶里添薪膀胱下口曲而斜上以入陰莖溺能射出者則又肺氣注射之力也少陽屬腎腎上連肺故將兩臟三焦者中瀆之府也水道出焉屬膀胱是孤之腑也是六腑之所與合也上言腎合膀胱此言腎又合三焦也少陽者水中之陽是為相火屬腎者屬於腎中命門也命門即腎系由腎系下生連網油膜是為下焦中生板油是為中焦上生膈膜是為上焦其根源實出於腎系腎系即命門也命門為相火之根三焦根於命門故司相火而屬於腎夫腎具水火合三焦者是相火所合也又云腎上連肺者金水相生是水陰之所合也故腎雖一臟而將為兩臟矣腎主水而行水之腑實為三焦三焦即人身膜油連腸胃及膀胱食入於胃由腸而下飲水入胃則胃之四面均有微管將水吸出散走膜膈此膜即三焦也水由上焦歷肝膈透腎系入下焦油膜以達膀胱故三焦者中瀆之府水道出焉屬膀胱者謂三焦與膀胱相聯屬也是孤之府謂五臟各配五腑而三焦司腎水之決瀆又獨成一腑也是六腑之所與合句又總言六腑合五臟相合而成功也中國自唐宋後不知三焦為何物是以醫法多訛西醫為連網知其物矣然不知其發源何處所名同何氣是以知猶不知故將五臟之將當讀如將帥之將言少陽三焦下連屬於腎上連屬於肺腎肺相懸全賴少陽三焦以聯屬之然則少陽一腑故已統帥兩臟如一將而將兩營也是孤之腑言少陽三焦獨成一腑極其廣大故能統兩臟又言屬膀胱者是三焦下出之路足見自肺至膀胱從上而下統歸三焦也臟腑之官官謂所司之事也無病則各效其職有病則自失所司心者君主之官神明出焉人身知覺運動無一不本於心故百體皆為之臣而心為君主也西醫言人心只是頑然一物不能司知覺運動其司知覺運動者全在腦髓嘗割兔腦剜其腦之後筋則身縮可知司運動者是腦後筋剜其腦之前筋則叫號可知司知覺者是腦前筋以此擬人亦無不然豫謂西醫此説非也人身破一皮拔一毛無不痛縮叫號者何必剜腦氣筋而後身縮叫號哉蓋西醫知髓而不知髓是何物內經云腎主髓髓者腎精所生腎與心原互為功用髓筋通於心乃腎交於心合為離卦中含坎水之象所以能司神明也詳心藏神注即如西醫所云腦後筋剜之亦不知叫號必其筋不與心通故也西醫又言腦有筋通於心當是彼所謂腦前筋司知覺者也夫因其與心通故司知覺則司知覺者仍是此心設以知覺為腦所司何以不通心之腦筋剜之亦不叫號哉即彼之説刺彼之謬可不辨而自明矣蓋腎足則髓足髓筋入心以水濟火真精內含則真光外發神明於是出焉蓋心屬火有光髓屬腎水能收引光氣心神上注於腦髓則光氣相照而事物曉然參看上腎藏志注尤明肺者相傅之官制節出焉心為君主肺在心外以輔相之心火恐其大過則肺有清氣以保護之如師傅之輔助其君也故稱相傅之官究其迹象則因心血回入於肺得肺氣吹出血中濁氣則復變紅而返入於心在內經乃營血與衛會於肺中之説又即相傅之官所司職事也西醫則云回血返入肺中吹出血中炭氣則紫色退而變為赤血復入於心肺是淘汰心血之物此即內經肺為相傅之義但中國不名炭氣只名濁氣也心火太過則氣有餘而上逆下注心火不足則下泄上為飲咳皆不得其制節之故也惟肺制心火使不太過節心火不使不及則上氣下便無不合度肝者將軍之官謀慮出焉凡人身之陰陽陰主靜靜則有守陽主動動則有為肝為厥陰經乃陰之盡也故其性堅忍而有守厥陰中見少陽陰盡陽生膽火居於肝中陰中含陽陽氣發動故能有為謀慮從此而出所以稱為將軍之官故肝氣橫者敢為狂亂肝氣虛者每存懼怯膽者中正之官決斷出焉西醫言苦膽汁乃肝血所生中國舊説皆謂膽司相火乃肝木所生之氣究之有是氣乃有是汁二説原不相悖惟西醫言人之懼與不懼不關於膽而又不能另指一所實未知膽為中正之官故也蓋以汁論則膽汁多者其人不懼以氣論則膽火旺者其人不懼太過者不得乎中則失其正是以有敢為橫暴之人不及者每存懼怯亦不得乎中正也膽氣不剛不柔則得成為中正之官而臨事自有決斷以肝膽二者合論肝之陽藏於陰故主謀膽之陽出於陰故主斷膻中者臣使之官喜樂出焉膻即胸前膈膜周回連著脅脊以遮濁氣膈膜名膻而居膻之中者則是心包絡舊注以膈為膻中不知膈遮濁氣只是上焦一大膜耳不能代心宣化何得名臣使之官惟心包絡則相心布令居於膻膈之中故名膻中屬相火又主血以血濟火則和而不烈故主喜樂心憂者包絡之火不宣也心過喜者包絡之火太盛也西醫言心上半有夾膜裹之即包絡之謂也但西醫不知包絡所司何事脾胃者倉廩之官五味出焉各臟腑各名一官惟脾胃兩者合名一官何也蓋胃主納穀脾主消穀二者相合而後成功故脾與胃統稱倉廩之官言脾胃主消納五穀也而又云五味出焉者蓋五穀備具五味一入胃中即化為汁液從脾之油膜散走達五臟出焉者出脾胃而達諸臟腑營衛也胃不納穀則五味不入胃屬陽宜燥之脾不化谷則五味不能達於各臟脾屬陰宜滋之小腸者受盛之官化物出焉盛音承貯也小腸上接於胃凡胃所納之物皆受盛於小腸之中西醫云小腸通體皆是油膜相連其油膜中皆有微絲血管與小腸通膽之苦汁從微絲血管注入腸中以化食物脾之甜肉汁亦注入小腸化物而物所化之精汁即從膜中出小腸而達各臟故曰化物出焉王清任醫林改錯以附小腸者為雞冠油更名氣府謂為元氣所存主化飲食而不知內經明言小腸者受盛之官化物出焉已實指小腸之氣化矣其附小腸之油膜即中焦也屬之於脾小腸又繫心之腑其相通之路則從油膜中之絲管上膈達包絡以達於心心遺熱於小腸則化物不出為痢為淋脾陰不足則中焦不能受盛膈食便結三焦相火不足不能薰化水穀則為溏瀉西醫又有小腸發炎之症即中國之泄痢腸癰等症中國近説水入小腸然後從闌門下飛渡入膀胱西醫斥其非也水從胃已散出走連網中詳下三焦注然則小腸中所受盛者只是食物乃陰質也飲主化氣食主化血食物在小腸皆化為液以出於連網遂上奉心而生血所以小腸為心之腑乃心所取材處也大腸者傳道之官變化出焉變化出三字謂小腸中物至此精汁盡化變為糟粕而出其所以能出之故則賴大腸為之傳道而大腸所以能傳道者以其為肺之腑肺氣下達故能傳道是以理大便必須調肺氣也另詳五臟所合條腎者作強之官伎巧出焉西醫云人之才智均出於腦髓人之筋力均出於腦氣筋究問腦髓何物則西醫不知也蓋髓者腎精所生精足則髓足髓在骨內髓足則骨強所以能作強而才力過人也精以生神詳見心藏神注精足神強自多伎巧髓不足者力不強精不足者智不多西醫論髓之法多而治髓之法少以不知髓是腎所生是以無從施治也中國近醫則又知腎不知髓反為西醫所笑不知古聖內經已有髓海論骨空論又將腎與髓合論之甚矣古聖人千古莫及矣三焦者決瀆之官水道出焉焦古作膲即人身之膜膈所以行水也今醫皆謂水至小腸下口乃滲漏入膀胱非也醫林改錯西醫均笑斥之蓋自唐以後皆不知三焦為何物西醫云飲水入胃胃之四面皆有微絲血管吸出所飲之水散走膈膜達於連網油膜之中而下入膀胱西醫所謂連網即是膈膜及俗所謂網油並周身之膜皆是也網油連著膀胱水因得從網油中滲入膀胱即古所名三焦者決瀆之官水道出焉是矣三焦之根出於腎中兩腎之間有油膜一條貫於脊骨名曰命門是為焦原從此係發生板油連胸前之膈以上循胸中入心包絡連肺繫上咽其外出為手背胸前之腠理是為上焦從板油連及雞冠油著於小腸其外出為腰腹之腠理是為中焦從板油連及網油後連大腸前連膀胱中為胞室其外出為臀脛少腹之腠理是為下焦人飲之水由三焦而下膀胱則決瀆通快如三焦不利則水道閉外為腫脹矣西醫知連網之形甚悉然不名三焦又不知連網源頭並其氣化若何皆不知也膀胱者州都之官津液藏焉氣化則能出焉凡人飲食之水無不入於膀胱膀胱如人身之洲渚故曰州都之官人但知膀胱主溺而不知水入膀胱化氣上行則為津液其所剩餘質乃下出而為溺經文所謂氣化則能出者謂出津液非出溺也氣化二字自唐以下無人知之吾於此特詳言曰火交於水即化為氣觀西法以火煎水而取輕氣即是火交於水化氣之一證人身之水火如何交哉蓋人心主火人鼻吸入之氣乃天陽也亦屬火西醫云氣從鼻入其管入肺歷心系循背脊以下入腎系又從腎系達連網以至於臍下按西醫所説吸入之路推究其理則知吸入者是天陽屬火也歷心系則引心火而並下入臍下即氣海也女子名為胞宮經云膀胱者胞之室胞即油膜一大夾室能伸能縮實大過於膀胱胞與膀胱只隔一間又全在微絲血管與膀胱相通凡人吸入之天陽合心火下至胞中則蒸動膀胱之水化而為氣與西法以火煎水取氣無異夫此膀胱之水既化為氣則透出膀胱入於胞中上循臍旁氣衝上膈入肺而還出於口鼻上出之氣著漆石則為露珠在口舌臟腑之中則為津液且氣之出口鼻其顯然者也又外出於皮毛以薰膚潤肌而為汗所謂氣化則津液能出者此也老人溺多化氣少而水質多壯者溺少化氣多而水質少也西醫但言氣從肺歷心系而至臍下未言出氣之路其意以為仍由原路而出不知非也蓋氣之出路實循氣衝上達於膈而出於肺西醫云胸膈乃助肺扇動呼吸之物不知膈為出氣之路非入氣之路不得混言扇動呼吸也夫吸從脊入督脈主之呼從膈出任脈主之吸入陽也火交於水也呼出陰也氣仍可返為水也呼吸循環道家以為祕訣醫家昧其指歸惟內經氣化則能出矣一語明明指破何注家多不識耶火不足以蒸水則津液不升氣不得化水不足以濟火則津液乾枯小水不下按上言臟腑所合只有五臟六腑此條出蘭臺祕典論又添出膻中一臟是為六臟六腑論乃備矣且腎具水火中系屬火為命門故上條云少陽屬腎謂三焦相火其根在命門也腎上連肺謂金水相生而膀胱為之府也又曰故將兩臟是腎與命門又可分為兩臟而配三焦膀胱之兩腑矣難經以左為腎右為命門自有取義然則言五臟六腑者舉其要也言六臟六腑者備其物也再加命門而為七臟六腑又其零也蓋天地陰陽奇耦不無零正參伍錯綜以盡其變人之臟腑應之所以經有奇經而臟腑亦有零奇歟五藏九竅前五臟所屬內只七竅此條備論九竅乃無遺漏肝開竅於目注見前五臟所屬條心開竅於耳耳系腎竅此言心竅者心與腎相交聽音者腎精也而辨語者心神也心小腸之脈入聽宮陳修園以此為司聽之主而不知耳通於腦髓腦氣筋下通於心西醫言之甚詳故耳為腎竅又為心竅均由腦通從可識矣三焦為腎腑耳內為腎竅故耳外則三焦之脈繞之耳又為心竅故耳外之小腸經脈亦注於聽宮以見腑之應臟有如是者不得指小腸之脈為耳竅通心之路也修園之説猶差一黍脾開竅於口注見五臟所屬條肺開竅於鼻同前腎開竅於二陰前陰是膀胱下口主出溺膀胱者腎之腑也腎主水化氣化水從前陰而出故前陰為腎之竅又前陰有精竅與溺竅相附而各不同溺竅內通於膀胱精竅則內通於胞室女子受胎男子藏精之所尤為腎之所司故前陰有病溺竅者有病精竅者不可不詳辨也後陰是大腸下口宜屬於脾胃然其體在下以部位言之凡在下者皆腎所司腎液充腴則肛門不結腎氣充攝則不脫肛惟其二陰皆屬腎竅故經言腎為胃關以飲食之質皆從二陰出也西醫圖畫二陰甚悉然不知二陰究屬何臟所以治法不精余按腎開竅於二陰而前陰之病多出心肝後陰之病多由脾胃又以耳為心竅與心開竅於舌之義不同總見五臟錯綜互相通貫學者宜詳參焉男女天癸世謂女子之經血為天癸非也內經明言男子亦有天癸而注內經者又不能實指為何物王冰舊注知其所至之地而於天癸究未明言吾嘗細考經文參證西法旁及丹經別録於陰陽水火血氣數端頗能分析因詳注之又此章元微西洋醫法所不能知故西人於女子之經水男子之精氣皆不能洞悉源委女子二七而天癸至七為陽數八為陰數離為女坎為男皆陰陽互換之道故男陽而得陰數女陰而得陽數女子七歲更齒二七而天癸至天癸者天一所生之癸水乃腎中一陽之氣化而為液也至者謂腎氣化水至於胞中也任脈通太衝脈盛月事以時下人身總統陰陽者只是任督兩脈任居前面屬胃屬心主後天督居背脊屬腎主先天二脈交會則在胞中胞居大腸之前膀胱之後乃是油膜中一個夾室此胞之膜上連網油又上則歸結於背脊中間是為腎中之系即命門也督脈貫之為先天陽氣之根源氣即水也西法於水中取氣凡人口鼻之氣著物皆化為水而腎中天一陽氣所生之水則為癸水至者癸水發於腎系之中下八網油而至於胞中也此是督脈所司先天腎中之陽交於胞中是水非血也屬先天之氣分其屬後天血分者則為衝任兩脈衝任麗於陽明屬後天主奉心化血陽明飲食所化之精汁上歸於肺奉心火之化則色赤為血既化成血則由衝任兩脈導引而下行以入胞宮與天癸之水會合所謂任脈通者蓋任脈起於胞中天一陽氣所化之癸水既從督脈下入胞中則後天任脈感陽氣而通暢其麗於任脈者為太衝脈亦得天癸之陽而所化之陰血更加盛滿於是陰血循衝任亦下入胞中與癸水會合則為經血年月一行是為月事故曰月事以時下女子屬陰以血為主天癸之水氣亦從血化皆為赤色其實中有水液也督脈癸水之陽不足則經遲經滯衝任之陰血不足則經淡經枯男子二八腎氣盛天癸至男女雖有不同而其先天皆主腎後天皆主胃男子二八先天腎中生陽之氣所化癸水亦至胞中女子之胞名血海名子宮以其行經孕子也男子之胞名丹田名氣海名精室以其為呼吸之根藏精之所也胞乃先後天交會之所先天督脈腎陽所化之水既至胞中則後天衝任奉心所化之血與水相應而衝任通暢亦下胞中為陰與陽應氣與血交女子以血為主則水從血化而為經男子以氣為主則血從水化而為精精清者血不足精不射者氣不足精少者氣血均不足精氣溢瀉血從水氣之化而非清水必稠濁者以其水中有血質故也惟其血與水合化而後精氣溢滿得瀉出矣西醫言精是外腎睪丸所生不知睪丸只是發精之器非生精之所西醫因剖視只見睪丸內有精而別處無精不知精生則運行不見既死之人而求其化生所在決不得矣睪丸中之精亦死精耳安可據此以為生精處哉詳全體總論篇陰陽和故有子此又統男女言之天癸水為陽衝任之血為陰和者謂會於胞中合同而化也女和則經行男和則精溢故能生育而有子今人不知此理而妄行服藥以求有子能無誤乎此節乃血氣交會化為月信變為腎精之原委最要之義也化為精者上行循督脈而入脊上腦是生骨髓循任脈而上頰繞唇是生髭鬚出於皮膚生毛亦較女子更重蓋男子之血不下瀉化精氣而上行外達所以多鬚毛也血主陰主下行女子之水從血化而為經則內行下達每月一瀉其餘血氣既下瀉所以上無髭鬚外少毛毫也且女子之骨較弱亦以經血下行而上生骨髓者少矣西醫論髓而不知髓是何物所生只原未識氣血變化之理也另詳於後血氣所生人身只氣與血兩者而已火交於水即化為氣義已詳膀胱三焦條茲不再論惟水交於火即化為血之理尚未發明特詳於此南方生熱熱生火火生苦苦生心心生血熱火生苦苦生心已詳卷首惟心生血句尚待注明蓋心屬離卦內陰爻坎之水也外陽爻則離本卦之火也惟其以水濟火乃發光明而成離象是以灌膏則燎盛抽薪則焰息薪膏有汁液火得之而後然即是以水濟火之明驗矣人身心象離卦必在下胞中腎陰之水津循衝任上入於胃合飲食所化之汁上騰於肺部以入於心此汁得心火之化遂變為赤色是為血西醫云飲食之汁由吸管返運至頸會管與心血混為赤色此一混字殊謬豈有日日混入而血不加淡者乎不知汁入頸會管即水交於火也變為赤色即奉心火之化而為血也血之生化如此西醫言血內有紅白二輪紅多白少不知其白者水液之本形也其紅者奉心所化之赤色也食氣入胃濁氣歸心淫精於脈脈氣流經飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行飲是本於天陽主化氣之物食是本於地陰主化血之物今人不知血氣根源本於飲食惟此條經文言飲食氣血生化之原委也氣乃水之所化凡飲水皆屬化氣之物所謂飲入於胃云云即三焦膀胱條所注水氣往來之道路也水津四布五經並行者謂水化津液而四布則五臟之經脈得其調養乃並行而不悖也義已詳十二官條茲不再贅惟食氣入胃濁氣歸心淫精於脈脈氣流經此單言化血之理尚待詳言食者有形之陰質故主化汁變血得脾之運健肝膽疏利則化為汁液西醫言甜肉汁入胃化谷苦膽汁入胃化谷同一意也既化為汁騰布於上得肺氣之化則色白婦人之乳汁是矣婦人乳子此汁已供兒食不能入心化血則血無餘故月經停而不行斷乳之後此汁上行入心則化為血既化為血則轉而下行每月有餘是以行經男子血所由生與婦人同但化精化經各不同耳濁氣歸心之濁字訓稠濃之意非謂渣穢也陰汁稠濃上歸於心則化為血既化為血則淫溢此精汁而散行於脈管西醫謂心有出血管導血出又有回血管導血入西醫名管中醫名脈二而一也脈氣流經者謂流行於各經絡而回復有常西醫云心左房之血由出血管導行於周身心體動跳不休每一跳則周身之脈應之而跳血既行遍周身則轉入回血管其色變紫以受炭氣也紫血由回管遞傳復返於頸會管得肺氣呼出則炭氣出而紫色退復變為赤入心右房轉至左房而又出也則脈氣流經之謂矣時醫有大絡散衆絡衆絡散孫絡之説言其出而不言其復與流經二字尚不確切故引西醫之説證之西醫所圖脈管詳矣然不能分別十二經脈又其言回血不能分別幾時方回於心惟內經言一呼脈行三寸一吸脈行三寸則能算出血行之時節何時出者當於何時回矣義詳營衛生會篇甚矣古聖之精也中焦受氣取汁變化而赤是為血義詳上條重引此者總見血所由生也谷入於胃脈道乃行水入於經其血乃成此節總言血脈出於胃中飲食所化之汁上行入於心管化為血以散為衆脈所以脈道乃行也下言水入於經其血乃成一水字尤精微即吾所謂水交於火即化為血合為離中含陰之象也水生於腎中入於胞室是為天癸水循衝任上行入胃則津液充足濡化谷食谷化為汁其中仍有天癸之水氣在也此汁上入於心是為水交於火得心火化之變為赤血此所謂水入於經其血乃成也血之支派散走內外循環無端而其總統則在任脈既化為血即循任脈而下入於胞中與腎氣天癸之水合男子化精髓女子月信下胥由於此矣西醫言血中有養汁明汁為白輪血為紅輪此不知養汁明汁即水交於火而化血者也內經以任脈為血之總司西醫則有總脈管之説謂從心左房出而至腹中腹下乃分是匹考究其總管之道路卻只是任脈之道路也蓋血之支派散走內外循環無端而其總統則在任脈血即循任脈而下入於胞中與腎氣天癸之水合男子化精髓女子月信下此條詳血略氣其實血氣二者不能相離論氣詳膀胱氣化條論血氣相合癸條參看自明營衛生會營衛即氣血而名之曰營衛者氣血以體言營衛以用言故必另詳其義也氣血之變化男精女經氣血之功用陰營陽衛各有區分尤宜詳辨此全是生人之作用若剖視死人則不得也人受氣於谷其清者為營濁者為衛營在脈中衛在脈外營周不休五十度而復大會陰陽相貫如環無端衛氣行於陰二十五度行於陽二十五度分為晝夜太陽主外太陰主內各行二十五度平旦陰盡而陽受氣矣營者血也衛者氣也血守於內如兵家之安營故曰營氣御於外如兵家之護衛故曰衛上篇言濁氣歸心為血此言清者為營濁者為衛非刺謬也上篇濁字指陰汁言以陽為清則陰為濁矣此篇清濁以剛柔言陰氣柔和為清陽氣剛悍為濁故曰清者為營濁者為衛也營在脈中謂營血由心之脈管散為衆管達於上下又有回脈管復回於心總在皮膜肌肉之裡以為陽氣之守也衛在脈外謂衛氣上輸於肺走於臟腑外達皮毛以護衛營氣為陰之外衛也營周不休者謂營行脈中周於通身將人身三停內外分為五十度一日一夜營血周行五十度而復返於肺與衛氣大會西醫謂心有左右兩房生血由左房出有運血管由內達外然後入回血管由外返內復入於心回血色紫返心過肺管呼氣出則吹去紫色紫色者炭氣也紫色已去仍變赤血而返於心由右房入又由左房出循環不休西醫此説即內經營周不休五十度而復大會之實迹也所謂陰陽相貫如環無端也衛氣之行則分陰陽內外太陽在外為陽太陰在內為陰晝則衛氣行陽二十五度夜則行陰二十五度平旦行陰已盡陽分受氣是衛氣復於肺與營相會矣衛行於陽則寤衛行於陰則寐故難經言衛行五十度復會於手太陰而人之臥起皆衛氣出入之驗也靈樞云人經脈前後上下左右周身十六丈二尺為一度人一呼脈行三寸一吸脈行三寸計晝夜一萬三千五百息脈行五十度也西醫將脈管剖視自謂詳矣而不能分出各經又不能共計其長短於回血合氣之數皆無從起算然則西醫安能如中國古法之精哉營出中焦衛氣出於下焦上言人受穀氣清者為營濁者為衛似營衛皆出中焦矣而此又別之曰衛氣出於下焦則尤為探源之論蓋人身只此先後兩天為生化之本營血雖生於心而取汁則在中焦故曰營出中焦是後天之所生化也衛氣雖統於肺周於太陽皮毛之間而其氣之化源則在臍下丹田氣海之中是先天之所生化也衛出先天督脈主之營出後天任脈主之任督相貫營衛相循如此其精微也舊注不知乃謂衛氣出於下焦之下字當作上字則誠誤矣心者血肺者氣血為營氣為衛相隨上下謂之營衛營衛雖生於中下二焦然營衛之行則統於心肺周行上下也上既言之而茲又引難經此語取其詳明不厭煩復也此篇前二節出靈樞後一節出難經再參看十二官男女天癸血氣諸條自能通貫六經六氣天有金木水火土之五行以運行不息名曰五運人秉之而生五臟所以應五運也義詳卷首茲不再贅天有風寒濕燥火熱之六氣以充塞萬物人秉之而有六經臟腑各有一經合為六經所以應天六氣也名太陽者因天有此太陽之氣名太陰者因天有此太陰之氣六經之名皆本於天非由人強名之也必知經氣之所主而後病情可識矣此等氣化乃生人所以然之理見病之原委皆盡於此西醫全不能知其治病多誤少陽之上火氣治之中見厥陰陽明之上燥氣治之中見太陰太陽之上寒氣治之中見少陰厥陰之上風氣治之中見少陽少陰之上熱氣治之中見太陽太陰之上濕氣治之中見陽明所謂本也本之下中之見也中見之下氣之標也本標不同氣應異象天有六氣人秉之而有六經六經出於臟腑臟腑各有一經脈遊行出入以布其化而經脈中所絡之處名為中見也足少陽膽經由膽走足中絡厥陰肝臟手少陽三焦經由三焦走手中絡厥陰包絡故少陽經中見厥陰手少陽三焦足少陽膽同司相火是相火者少陽之本氣也故曰少陽之上火氣治之謂二經之臟腑以火為主是本氣也中見厥陰是其中有風氣居之也而其標為少陽經則又主陽氣之初動也足陽明胃經屬燥土手陽明大腸經屬燥金此雨經皆燥氣主治手陽明大腸經脈循行絡太陰肺而後走手足陽明胃經脈循行絡太陰脾而後走足故陽明經中見為太陰也足太陽膀胱經屬寒水手太陽小腸經屬君火手從足化以寒水為主故太陽之上統稱寒水治之手太陽經脈循行絡少陰心而後走手足太陽經脈循行絡少陰腎而後走足故二經中見少陰也足厥陰肝經屬風木手厥陰包絡經屬相火子從母化以風為主故厥陰之上風氣治之手厥陰經中絡少陽三焦足厥陰經中絡少陽膽故二經中見少陽也足少陰腎經屬水陰手少陰心經屬火熱心為君主腎從其化故少陰兩經統是熱氣主治手少陰心經中絡太陽小腸足少陰腎經中絡太陽膀胱故曰中見太陽足太陰脾經屬濕土手太陰肺經屬清金二經子母同氣故太陰之上濕氣治之手太陰肺經絡手陽明大腸足太陰脾經絡足陽明胃故曰中見陽明所謂本也句總結上文謂六經之上其主治者皆其本氣也本氣根於臟腑是本氣居經脈之上也由本氣循經下行其中絡者中之見也由中見之下而經脈外走手足以成六經又各有太少陽明厥陰之不同則又系六氣之末故曰氣之標也或標同於本或標同於中標本各有不同而氣化之應亦異象矣故六經各有病情好惡之不一仲景傷寒論全根於此不可不詳究焉再按六經之名太者陰陽之至大少者陰陽之初生明者陽氣之極盛厥者陰氣之竭盡也先知五行以為體又知六氣以為用然後可以讀傷寒金匱然後可以治男女百疾西醫於六經名目從未得知於氣化安能夢見乃云人是錪鐵養炭等共十四質湊合而成夫彼所謂十四質皆經剖割鍛鍊然後取得其質而人之未死者豈止此塊然之質哉經氣主治六經六氣各有所從所主之不同必明此而後知氣化之理若西洋醫既不知此則亦不必與辦也少陽太陰從本少陰太陽從本從標陽明厥陰不從標本從乎中也此言六經氣化或以臟腑本氣之陰陽為主或以經脈標氣之陰陽為主或以中見之氣化為主各有性情之不同也陳修園傷寒論注引張景嶽之論曰少陽太陰從本者以少陽本火而標陽太陰本濕而標陰標本同氣故當從本然少陽太陰亦有中氣而不從中者以少陽之中厥陰木也木火同氣木從火化矣太陰之中陽明金也土金相生燥從濕化矣故不從中也少陰太陽從本從標者以少陰本熱而標陰太陽本寒而標陽標本異氣故或從本或從標而主治須審也然少陰太陽亦有中氣而不從者以少陰之中太陽水也太陽之中少陰火也同於本則異於標同於標則異於本故皆不從中氣也至若陽明厥陰不從標本從乎中者以陽明之中太陰濕土也亦以燥從濕化矣厥陰之中少陽相火也亦以木從火化矣故陽明厥陰不從標本而從中氣也要之五行之氣以木遇火則從火化以金遇土則從濕化總不離乎水流濕火就燥同氣相求之義耳此注甚明知此而後知邪正之盛負表裡之傳變也太陽為開陽明為闔少陽為樞太陰為開厥陰為闔少陰為樞開之過陽明胃經主納水穀化精汁灑行五臟六俯化糟粕傳入大腸小腸其氣化主於內行下達故陽明主闔凡是嘔逆自汗等皆陽明不能主闔之過少陽三焦內主膈膜外主腠理內外出入之氣均從腠理往來故有邪在腠理則寒熱往來太陽之氣不得外達諸證上下往來之氣均從膈膜行走故有結胸陷胸邪欲入胃則嘔甚則嘔吐不止諸證凡此皆少陽不能司其轉樞之過也太陰為開者手太陰肺主布散足太陰脾主運行凡血脈之周流津液之四達皆太陰司之故曰太陰為開也厥陰為闔者足厥陰肝經主藏下焦之陰氣使血脈潛而精不泄手厥陰心包絡主藏上焦之陰氣使陰血斂而火不作故曰厥陰為闔也少陰為樞者手少陰心經內合包絡下生脾土故能為二經之轉樞足少陰腎經上濟肺金下生肝木亦能為二經之轉樞也此數者為審證施治之大關鍵不可不詳究也內經此數條言人身氣化最精中國注傷寒者尚有人知西洋醫法從無論者故論形雖精而論治轉粗耳張隱菴陳修園注傷寒全本於此讀者詳之十二經脈手陽明大腸脈起大指次指之端出合谷行曲池上肩貫頰夾鼻孔下齒入絡肺下膈屬大腸大腸是肺之腑故大腸經脈亦與肺經相為表裡肺脈起大指內側大腸經亦起於大指之端而其支又起於次指之端者以見同源異流之義耳合谷俗名斧口皆肺脈交會之所也三陰經行肘內三陽經行肘外手陽明經由合谷上行至曲池上肩貫頰挾鼻孔鼻孔者肺之竅也大腸者肺之腑也肺臟開竅於鼻而腑之經脈即上夾於鼻臟腑之相應何其巧也下齒入絡肺尤其氣化所稟承者由肺下膈屬於大腸知經脈與肺相貫之故即知大腸全秉肺之氣化矣凡經脈皆出於臟腑而手之三陰三陽論穴者均由手起不過便於數穴耳實則先有臟腑而後生出經脈非有此手上之經脈而後有臟腑也大腸與肺皆主秋金屬商音肺太陰起少商者商之陰也大腸經起食指內側名商陽穴其主金商而屬陽也此一臟一腑對舉之穴合谷在虎口秋金白虎之口手陽明與肺相合處曲池在屈肘橫紋盡處肩髎在肩骨之端天鼎喉旁四寸與食管相當處故名鼎禾髎即頰車也繞齒齦夾鼻為迎香穴肺開竅於鼻而其腑之經脈終於夾鼻足見相應之妙用足陽明胃經脈起眼下入齒環唇循喉嚨下膈屬胃絡脾下挾臍至膝下入足中指胃脈起於眼下繞面行故人正面均屬陽明經入齒故齦肉全屬陽明環唇者脾臟開竅於口故胃腑之脈從外環之以應乎脾亦如手陽明經夾鼻之意循喉嚨兩旁動脈為人迎穴是矣下膈屬胃絡脾所以秉氣於脾也下挾臍至膝下三里穴膝脛以前均陽明經之所行入足中指陽明脈所止之處胃脈上起承泣在眼下循面入上齒出環唇下至喉旁寸五分名人迎穴又下橫骨內為缺盆穴缺盆骨下陷中為氣戶穴謂肺氣與胃脈相通之門戶也入屬胃又行臍旁二寸為天樞穴膝外陷中名犢鼻穴膝下三寸三里穴皆胃氣之大會至足背為趺陽脈入中指其支者入大指次指之端名厲兌穴胃為後天統主前面衝任皆歸屬之足太陰脾之脈起大指之端上膝股入腹屬脾經胃上挾咽連舌本散舌下起足大指隱白穴上膝入股謂股之內面入腹屬脾臟而又絡胃是胃陽明居太陰之中故六氣標本謂太陰中見陽明也上膈挾咽與陽明同路惟陽明發於面而太陰終於舌本一陰一陽各有不同蓋陽明為陽之盛故上於面以衛外太陰為陰之至故終於舌下以生布津液使津液出於口用濟陽明之燥此陰陽所以互為功用也脾經起大指內側隱白穴循內踝陷中名商邱穴踝上三寸名三陰交穴以三陰之脈交會於此也循膝內側上股入腹中屬脾又見於食竇穴言胃中之食由脾所化此為化食之竅道也從此又絡胃上挾咽連舌本散舌下足見為心之苗又即脾經之根源矣舌辨其味脾即食其味故脾經散於舌下外經穴尚可圖若其散行繞絡由胃至舌之迹則非形迹可圖也手少陰心之脈起於心中出心系下膈絡小腸復上肺出腋下至肘抵掌中入小指之內其支者上挾咽中國舊説心有四系下通於各臟者非也西醫剖視並無四系言心有左右房左房生血遞出為總血管分為衆管散於臟腑周於身於是入回血管復循行至心之右為總回血管遞入心為血一周是心之通於四臟者在血管也西醫名管而內經則名為脈內經云營行脈中營周於身心之合脈也即是西醫之説矣但西醫不能分別各臟各有經脈只將衆脈管皆屬於心而不知手少陰心又有專屬之脈也出心系下膈絡小腸心所以與小腸相表裡也復上肺心主血肺主氣營衛之交會全在於此西醫謂回血受炭氣皆變紫色遞至總回管得肺氣呼出則炭氣散而紫血復變為赤仍入心由右房遞左房而後出也內經言少陰心脈復上肺便是大會於肺之路矣又出腋下肘入小指之內其支者上挾咽故少陰有咽痛症心脈之用事在下絡小腸為生血運血之路道其支者上夾咽上系目系此最主氣化處也至於出腋下極泉穴循肘抵掌後骨際為神門穴終於小指內側為少衝穴數穴皆經脈之枝葉也言針灸者但論外之經穴而言氣化者則其內之路道為猶重也手太陽小腸之脈起小指之端循手外上肘繞肩入絡心下膈抵胃入小腸少陰抵掌中太陽循手外此足見陰陽內外之不同也入絡心故太陽經中見少陰下膈抵胃小腸與胃原相連接以司其事也小腸之脈上胃絡心至頸分上下行上行至耳下曲頰之後名天容穴至面頄鋭骨之端名顴髎穴終於聽宮與足少陽相接壤其下行者從頸起至肩際陷中名臑俞穴至腕端五分名陽谷穴至小指外側名少澤穴此經與膀胱合氣故其司化與足太陽同足太陽膀胱之脈起目內眥上額交巔下腦後挾脊抵腰入絡腎下屬膀胱循髀外下至踝終足小指三陽經全將人身繞盡所以衛外為固也少陽終目鋭眥陽明終於目下之承淚穴故太陽經起於目內眥以見三陽相交而成其總統一身之局也上額交巔頂上全屬太陽所以頭上生髮者乃膀胱中之氣挾胞中之血合化上行而生頭髮故發名血餘以其根於胞血也凡烏髮均須滋水傷寒後其發必脫則又因膀胱氣化而後生髮故發又屬腎與膀胱之水也頭乃陽氣之所萃故其頂全屬太陽經下腦後風府穴為太陽經脈之要會挾脊抵腰故凡角弓反張傷寒背脊痛均屬於太陽入絡腎腎為水臟陽氣之原膀胱為其腑故其脈亦下絡腎循髀外下至踝終足小指總之行身之背自上及下以周於一身而主衛外也至陰穴在足小指外側為陰之極地太陽之陽根於水陰之中故其經亦起於至陰睛明穴在眼之大角而與陽明相交故稱睛明以見太陽之氣至頭面而極盛也膀胱與胞相連而胞膜著於腰下十九椎旁故其穴名胞肓肓之原根於腎繫上生肝系在十三椎旁因名肓門有肓即有膏膏生於脾而內護心外會於脊與肓相交在第四椎旁因名膏肓此太陽與心相會之穴也魄戶在三椎旁肺藏魄而合於太陽故名魄戶觀此經穴而知其氣之相通矣足少陰腎之脈起小指之下趨足心循內踝上股貫脊屬腎絡膀胱循喉嚨挾舌本其支者出絡心太陽經終足小指之外少陰經即起足小指之下以見一表一里相趨應也趨足心循內踝太陽行外踝少陰循內踝上股貫脊屬腎絡膀胱臟與腑所以交通循喉嚨者腎上連肺聲音出於肺而生於腎也挾舌本者腎主液所以出於口也其支者出絡心以見心腎相交坎離互濟之義耳足心湧泉穴為腎脈極底最忌瘡漏泄氣然骨在內踝下前一寸太溪在內踝後足跟骨上此處有動脈內經皆以為診凡病且死此脈不絶者尚可救治陰谷在膝下曲膝之間又上股入小腹絡膀胱循臍旁一寸名肓俞謂肓膜之要會在此也入屬腎上絡心循喉嚨挾舌本雖不列穴名而腎經之主化在絡心循喉挾舌處為尤多舌下湧泉為腎液所出猶津道之要也手厥陰包絡之脈起於胸中屬心包絡下膈歷三焦出液入肘抵掌中循中指之端西醫謂心之上面周圍有夾膜裹之即包絡也包絡上連肺系由肺系連及於胸內之四面皆是油膜又下為膈膜又下為網油膜所謂膜者皆三焦也三焦與包絡相通其迹如此故包絡之脈下膈歷三焦也出腋入肘抵掌中循中指之端故中指應心亦由於此包絡與三焦只一膜油相連故其脈從三焦至胸中而歸併於心包出於乳後一寸腋下三寸之間名天地間脈過腋下至肘抵曲肘陷中名屈澤穴刺痧疫多取此出血以瀉心包之邪也大陵在掌後兩筋之間又中指之末名沖良婦孕則此穴脈動足見心包血旺也手少陽三焦之脈起小指次指之端循手表上貫肘入缺盆布膻中絡心包絡下膈屬三焦支者出耳上角三焦根於腎系下為胞室當膀胱上口為下焦中為連網附著小腸為中焦上為胸膈又循胸而上統名為膻上連肺系而下入為心包絡故三焦與命門同司相火以其油膜相連也三焦與心包絡相表裡亦以其油膜從膻膈而上入為包絡也三焦經脈貫肘故肘上消灼清冷淵穴種牛痘能發出腎中之毒亦以三焦之原根於腎系故也膻中古本省作膽後人不知膻為何物遂誤膽為膽夫膽在膈下此云布膽中絡心包絡然後下膈則知膽系膻字之省非苦膽也此等字唐宋後均不之辨安可以注內經少陽為衝陽故第一穴名沖關小指次指陷中名中者抵掌後高骨凡三焦氣旺者此骨乃高起上至肘外大骨縫中名天井穴再上二寸名清冷淵以與手太陽經會而合於寒水之氣也再上至肘外對腋為消灼穴言其主相大也上至缺盆天髎穴即內入心包散行下膈而屬於三焦西洋言腹中統膜皆有自和腦筋如網絡之意即三焦經脈散布之義至缺盆合為一脈支者更上耳後尖骨陷中名翳風穴再上為瘈脈穴風瘈皆肝筋所主而焦膜乃生筋之原也故此二穴有此二名又繞耳前為耳門穴至眉尾空竅為絲竹穴具見腎開竅於耳而三焦為腎故其經繞耳以應之也足少陽膽之脈起於目鋭眥繞耳前後至肩下循脅裡絡肝屬膽下至足入小指之間足少陽脈與手少陽脈均行於耳均司相火內則三焦之膜連肝而及於膽外則三焦之經絡耳而交於膽經此以見臟腑相通之妙足少陽起目鋭眥名瞳子髎穴繞耳前陷中名聽會穴繞耳後發陷中名風池穴皆少陽風木所發泄處下至肩上陷中名肩井穴循側旁下至肝期門之下五分名日月穴膽脈實從肝膽出於此穴然後上下行也下行至股外垂手中指盡處名風市穴膝下一寸為陽陵穴循外踝至小指次指之間竅陰穴而終陽經根於陰穴以見陰生於陽中也足厥陰肝之脈起大指叢毛之際上足跗循股內過陰器抵小腹屬肝絡膽挾胃貫膈循喉嚨上過目系與督脈會於顛頂毛髮皆血之餘也肝主血故肝經起於足大指而其間即生叢毛以為主血之驗陰器名為宗筋乃通身筋之所主屬肝經故肝脈繞於陰器也小腹兩旁皆屬肝經故寒疝等證絡膽者厥陰之脈中見少陽肝與膽相表裡也挾胃者肝木清陽之氣上升疏土所以化物貫膈循喉嚨故肝氣逆有嘔滿諸證上連目系肝開竅於目也與督脈會於顛頂督脈屬腎為肝之母會於顛頂子會於母也目系顛頂內為腦髓腦風暈迷均肝所司以其脈相通也西醫詳論腦髓而無治髓之藥蓋不知髓系督脈所生又不知髓是肝脈所貫豈知其治法哉大敦在足大指叢毛中循足內側上至曲泉在曲膝橫紋盡處諸筋會於膝之穴也循股內抵陰器之橫骨盡處名鼠鼷穴繞陰器故生毛肝血所發泄也抵少腹上肋曲肘尖處為章門穴再上為期門穴乃肝之募謂肝膜之所通也從此入屬肝臟此為肝下行之脈貫膈絡胃循喉嚨上連目系則開竅於目與督脈會於顛頂陽經惟太陽最長陰經為厥陽最長乃氣血之司領也衝任督帶十二經正經也又有八脈名為奇經茲不具論而單論此四脈者蓋陽維陽蹻兩脈附於太陽經行身之背以太陽統治之矣陰維陽蹻兩脈行身之前附於太陰以太陰統治之矣惟此四脈主治有別不能賅於十二經中故另詳之西醫畫脈管枝分派別可謂詳矣然論絡不歸於經論經不歸於臟腑譬之有千軍而無一將則亦無所統屬矣至於奇經八脈中國且久不講何怪西醫不知耶衝脈起於少腹之內胞中挾臍左右上行並足陽明之脈至胸中而散上挾咽胞中名為氣海乃呼吸之根也人之呼氣由氣海上胸膈入肺管而出於喉其路徑全循衝脈而上故內經云沖為氣街蓋指此也凡是氣逆均責於沖故仲景有降沖逆之法胞中又名血海胃中飲食之汁奉心化血下入胞中即由衝脈導之使下故內經云女子二七而天癸至太衝脈盛月事以時下也總之胞中為先天腎氣後天胃血交會之所衝脈起於胞中導先天腎氣而上行以交於胃導後天陰血下行入胞中以交於腎導氣而上導血而下通於腎麗於陽明衝脈之所司可知矣衝脈者出氣之沖衢也氣生於丹田而其出路則在臍下三寸隔中行旁開五分名氣街穴是氣之出路故名氣街近醫因靈樞言胸氣有街腹氣有街頭氣有街足氣有街遂不能指出氣街穴在何處然內經明言起於氣街挾臍上行則明指氣街穴在臍之下也今人改氣街作氣穴大失經旨由氣街至臍旁為肓俞肓即膜也丹田之膜上會於臍故此穴名肓俞也又上胸至通谷穴而散蓋有膜上胸則散為肺衣而全包肺故衝脈亦至此而散肺衣會於咽故衝脈又夾咽而止總見氣出于丹田循臍旁上胸中走肺衣中又上會於咽則氣從之出矣膜中氣行之道路即名衝脈沖主氣與任之主血者不同可知十二正經奇經八脈各有所主不同皆各臟腑氣血往來之道路有散有合不得但指血管以為經脈也任脈起於少腹之內胞室之下出會陰之分上毛際循臍中央至膻中上喉嚨繞唇終於唇下之承漿穴與督脈交督脈在背總制諸陽謂之曰督任脈在腹總統諸陰謂之曰任陰陽相貫故任與督兩脈必相交下則交於前後陰之間上則交於唇之上下也以先後天論之督在脊屬腎屬先天任在腹屬胃屬後天先天主氣下交胞中後天主血下交胞中全在此二脈也以水火論督脈屬氣屬水任脈屬血屬火是任脈當又屬之心心腎相交水火既濟皆由於此故任脈者陰脈之海也任脈起胞中下至兩陰之間名會陰穴謂與督脈相會而當兩陰間故名會陰上至少腹聚毛之處名中極穴又上至臍下三寸為關元穴乃元陽元陰交關之所也出臍中上行至於鳩尾上二寸六分為膻中穴膻中是心包絡生血而出隨任脈上下運行故任脈之穴兼具包絡之名正見任脈為心包行血也從膻中上行三寸二分陷中為紫宮穴紫宮者指心而言也心應洛書九紫離卦故名紫宮任脈至此正內合於心故以心位名之正見任脈為心行血之統脈也又上至唇下為承漿穴與督脈交而任脈終其支者循面而至於眼下細觀任督之交會起止而知督脈主陽主氣任脈主陰主血互相貫通為生身之總司也督脈起於腎中下至胞室乃下行絡陰器循二陰之間至尻貫脊歷腰俞上腦後交顛至囟會入鼻柱終於人中與任脈交督脈起於腎中下至胞室腎中天一所生之癸水入於胞中全在督脈導之使下也腎氣至胞任脈應之則心胃之血乃下會於胞中此為任督相交心腎相濟道家坎離水火交媾之鄉即在於此督脈絡陰器循二陰之間與任脈會於下也貫脊上頂交於人中與任脈會於上也今細察其脈由鼻柱上腦貫脊抵腎由腎入胞中據此路道觀之乃知督脈主陽主生腎氣蓋氣生於天陽吸入鼻孔至腦門下肺管循背脊而下入腎又由腎入胞中故吸入則胞中滿也吸入之氣實由鼻由腦由脊而下故掩鼻張口能出氣而不能吸氣蓋吸由脊下非從鼻腦不能入也呼由膈出故張口能出氣也吸由脊下督脈主之知督脈之所主乃知氣之生化再詳天癸乃膀胱條督脈起於胞中出會陰穴至尾閭骨端名長強穴上至二十一椎名腰俞穴是腰腎筋膜所連也再上十四椎當腎正中為命門穴乃腎系貫脊之處為督脈之主蓋任是心血所司督是腎氣所司故命門為督脈之主穴也又上至第三椎為身柱穴肺腎相交為一身元氣之宰故稱為柱再上大椎至髮際一寸宛中為風府發上二寸五分為腦戶即西醫腦後葉之中縫也至顛頂為百會穴與肝脈交會於此前行當囟門為囟會穴謂心神上照於髓以發知覺是神與髓會之所也又至額上髮際為神庭亦是心神上出於此之義下鼻準至齒縫齦交穴而終蓋人身吸天陽入鼻循脊下腎系而入丹田總歸督脈所主化氣化精為人身命之原總督周身臟腑故稱督也帶脈當腎十四椎出屬帶脈圍身一周前垂至胞中帶脈總束諸脈使不妄行如人束帶故名究帶脈之所從出則貫腎系是帶當屬腎女子系胞全賴帶脈主之蓋以其根結於命門也環腰貫臍居於身之中停又當屬之於脾故脾病則女子帶下以其屬脾而又下垂於胞中故隨帶而下也帶脈後在十四椎當腎之中前在臍繞腰一周帶脈一穴則在季脅當少陽部位近圖帶脈三穴一帶脈穴在足少陽膽經季脅之下一寸八分再下三寸為五樞穴又下為維道穴似帶脈繞行三匝而有上中下三穴也然難經云脈帶起於季脅回身一周無三匝之説也又靈樞經曰足少陰脈別走太陽至十四椎屬帶脈後人遂以帶為腎之別脈非也屬帶脈者謂其為帶脈所管束非言帶脈是腎之脈也因其穴居少陽之界以為少陽脈者亦非也肝膽能為帶脈之病然帶脈終非肝膽之脈蓋帶主管結前後前束任而經心小腸之臍中後束督而經腎系之中人身惟脾主中州交合水火帶脈適當腰腹之中應歸為脾之脈也其穴在脅亦以前不居任位後不居督位正見其管束前後也或疑帶脈不與脾連豈知腹中膜油皆脾之物腎著陽治帶脈以脾為主女科以婦人帶下皆歸於脾良有以也按此四脈督在背總統諸陽屬先天任在腹總統諸陰屬後天衝脈麗於陽明而通於胞宮由後天以交於先天腎者也帶脈出於腎中以周行脾位由先天以交於後天脾者也四者互為功用不可不詳究焉
