body:
  text: 敘守方隅之見者不能馳域外之觀而好高務廣輩又往往捨近求遠趨新奇而廢正道如陳相師許行梁武尊佛氏不已傎乎然果能擇善而從則又如趙武靈王易胡服習騎射遂霸天下蓋窮變通久不拘於墟也方今四海為家五洲同軌自鴻荒以至今日天地開闢於斯為盛舉凡三才之所有百族之所宜上可損益乎古今下可參酌乎中外要使善無不備美無不臻駕三皇而軼五帝豈獨一材一藝彰明較著於天下已耶夫醫其小焉者也然即以醫論之五行列於洪範為調變陰陽之資十全重於周官實康濟斯民之助故自軒岐以逮仲景醫法詳明與政治聲教相輔佐晉唐以後漸失真傳宋元以來尤多紕謬及今泰西各國通於中土不但機器矜能即於醫學亦詆中國為非豈知中國宋元后醫誠可訾議若秦漢三代所傳內難仲景之書極為精確迥非西醫所及蓋西醫初出未盡周詳中醫沿訛率多差誤不及此時釐正醫道貽害生民不知凡幾余以菲材值古今大變局時自顧一手一足毫不能扶持中外惟於醫道嘗三致意因摘靈素諸經錄其要義兼中西之說解之不存疆域異同之見但求折衷歸於一是冀五大洲萬國之民咸無夭札始無歉於寸心夫醫其小焉者也所望賢士大夫採風觀政棄短取長得推行盡利之方策長治久安之術俾中外交泰同登熙皞雍和之盛則誠盡美盡善矣醫其小焉者也時大清光緒十八年歲在壬辰秋九月蜀天彭唐宗海容川敘於黃歇浦上袖海山房例言一唐宋以後醫學多訛西法近出詳形跡而略氣化得粗遺精皆失也因集靈素諸經採其要語分篇詳註為救其失起見非好辯也識者諒之一每篇標題四字以別章節知非著述體裁然使學者先知綱目易於尋求不嫌有乖大雅也一是書註釋多由心得實皆以經解經毫無杜撰間採西法或用舊說總求其是而已一是書期於實用與各種經古文詞不同故解義訓詁無漢宋門戶之分亦無中西異同之見要使經旨皎然足裨實用為有益於世耳一中國臟腑圖皆宋元后人所繪與人身臟腑真形多不能合故各圖皆照西醫繪出較舊圖實為美善一中國醫林改錯曾剖視臟腑與西醫所言略同足見中國臟腑與西人原無差別因採其圖以為印證一所採西人臟腑圖非但據西人之說實則證以內經形跡絲毫不爽以其圖按求經義則氣化尤為著實一十二經脈奇經各穴皆西醫所不能知因採銅人圖繪出意在發明經旨穴不盡載惟採有關經氣者詳悉注之一胃五竅及三焦中西皆無其圖今特本內經之義切實繪出揆之西人形跡亦無不合足見西人雖詳於形跡而猶未及內經之精一是書方證未能詳列然於審證處方之理業經發明則權衡在我無論中西各醫書皆有裁別不致迷眩是醫學正本清源之書也一是書所引內難經文未及其半然大義微言採注已備熟此後再讀全書自能渙然冰釋
