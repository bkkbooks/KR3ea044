body:
  text: 下卷全體總論以上所論臟腑其形體氣化大略皆具又有未盡者補注於此篇內多重出之義然意取求詳不嫌詞費西醫有全體圖考闡微等書將骨脈皮肉臟腑層折剖割以示精詳而究於陰陽氣化皆不能知似精實粗讀者參考自見五臟者所以存精神血氣魂魄者也六腑者所以化水穀而行津液者也精神血氣魂魄已詳五臟所藏條茲不再注六腑化水穀行津液亦皆見六腑條矣但腸胃膀胱人皆知其化水穀而三焦與膽所以能化水穀者人多不知也只緣不識三焦為何物又不知三焦為決瀆之官讀吾所注三焦條自能知之膽之所以化水穀者經旨言膽主清陽之氣上升入胃木能疏土也而西醫直言膽汁入胃化谷確有取驗言氣言汁義自賅洽詳十二官及脾胃膽三焦條參看乃見六腑皆主化水穀夫谷化則為液奉心而生血水化則為津達肺而為氣故曰行津液者也西醫言腸胃及各吸管中有養汁如牛乳有明汁如水不知明汁即津也養汁即液也西醫知其汁而不能言是何物所生惟內經則津生於水水入化氣而為津液生於穀谷入化汁而為液陽津陰液豈徒知其名物而不得其治法哉又詳營衛生會條腦髓骨脈膽女子胞此六者存於陰而象於地故存而不瀉名曰奇恆之府西醫言腦髓筋分走臟腑周身知覺運動均出腦氣筋言之甚詳然究不知腦髓是何物所化生故其言似精實粗蓋腎主骨腎系貫脊通於脊髓腎精足則入脊化髓上循入腦而為腦髓是髓者精氣之所會也髓足則精氣能供五臟六腑之驅使故知覺運動無不爽健非髓能使各臟實各臟能使髓也西醫又謂諸骨內之髓與腦中者不同又不知骨是髓之所生內經言髓生骨諸骨中之髓與腦無異惟諸骨中雜有油膜血絲耳蓋由腦髓散走諸骨皆穿膜附筋以入於骨所以內雜膜油血絲豈可云髓有不同耶脈者血之道路也詳心腎條膽附於肝已詳膽條女子之胞男子名為精室乃血氣交會化精成胎之所最為緊要西醫剖割精矣乃於膀胱之後大腸之前只知女子有胞宮而不知男子亦有胞宮以女子之胞極厚且大中空可驗男子之胞只是一層夾膜扁薄而不可見故只知男子有精管而不知男子之精管即從胞中出也特人死胞縮精收故扁且薄西醫忽不及察也此胞又名氣海氣入則臍下脹是其驗矣又名丹田詳天癸條此六者存而不瀉雖膽汁有出入而究與六腑之輸瀉者不同異於常腑故曰奇恆之府西醫言腦筋主知覺運動大腦在前小腦在後中為中腦有裂有回分歧疊積耳目口鼻全與腦通腦經分布又散行於臟腑肢體凡知覺運動皆腦司之也此說半是半非已詳辨於上卷五臟所藏篇至於腦汁究是何物所生則西醫不知蓋腎精生髓由脊上行以入於腦是為髓海在頭者名腦在衆骨中者名髓內經蓋分為二故云髓會絶骨而此與骨脈膽胞合為六者則分為二而言之也又西醫治腦無藥不知臟腑經脈皆交於腦源流出入豈無其路耶西醫詳圖骨式有相連而凹者有相連而凸者有如鋒者有如椎者有骨裂有骨衣骨皆外堅中松有筋相連有脈管回管腦筋透入於骨究人身諸骨則知上帝造創之功大哉然西醫未知何者為主骨何者為輔骨何處骨大而反不緊要何處骨小而反關生死如中國之洗冤録檢驗傷痕分別制命與否則論骨較精至於內經言骨更能探其源頭曰腎生髓髓生骨則知腰脊為主骨四肢為輔骨骨屬腎水而筋屬肝木筋著於骨者水生木也骨賴筋連者母用子也骨中之髓又會於絶骨齒又骨之餘者矣觀齒之生落而知男女老幼各有其時無不下應腎氣則知髓生骨之理非徒知其形而已也此後面腦筋圖西醫又有前面腦筋圖不具載者以腦髓生於腎循脊貫腦為督脈所司其前面腦筋總皆以後面者為本也此總脈管據內經考之即任脈也身之背亦有脈而不圖之以血之所主在於任脈至於動脈或隱或見或散或合有深淺分合之殊又西醫所未言胞宮之營發於腎系下為一大膜前連膀胱後連大腸中間一個夾室男子丹田氣海又名精室女子又名子宮血海陰道之內結束為子宮下口可收可縮又名子臟仲景所稱婦人臟燥臟結痛引陰筋皆指此言血管全繞網膜全包一主氣一主血交會於此為生化之大源胃大腸小腸三焦膀胱此五者天氣之所生也瀉而不存受五臟濁氣名曰傳化之府輸瀉者也糟粕形質之物皆曰濁氣由此五者傳化主輸瀉而不留故名傳化之府三焦與腸胃並論是三焦明有其物後人以為空腔子豈不謬哉詳三焦條各圖見上魄門上為五臟使水穀不得久存魄門肛門也肺藏魄肛門上合於肺故名魄門肺在上總統五臟而魄門在下令五臟之濁物從此而出故為五臟使既名魄門便知為肺所司既為五臟使便知肺亦能統五臟也男子肛頭西人圖之最悉蓋彼以刀割治病不得不詳其形跡然用心則苦而操術實粗中國痔漏等證擅長者多矣何嘗以刀割為能人有髓海有血海有氣海有水穀之海以應四海腦為髓海胞為血海膻中為氣海胃為水穀之海西醫論髓以為知覺運動之主謂腦髓筋達於臟腑肢體而後能司知覺運動也西醫知腦髓之作用而不知腦髓之來歷所謂腦筋但言其去路而不知髓有來路所以西法無治髓之藥也不知背脊一路髓筋乃是髓入於腦之來路也蓋內經明言腎藏精精生髓細按其道路則以腎系貫脊而生脊髓由脊髓上循入腦於是而為腦髓是腦非生髓之所乃聚髓之所譬猶海非生水之所乃聚水之所故名髓海既聚於此而又散走臟腑肢體以供使用如聚錢者庫也而用錢者人也人能用錢而錢不能用人臟腑肢體能用腦髓非腦髓用冬處也再者髓之生由於腎欲補髓者即從腎治肝脈入腦交顛目系貫髓凡神魂暈迷風狂皆從肝治之即是治髓腦又通鼻可從肺治髓筋入心可從心治髓筋聚於胃又可從胃以治之西醫論髓特詳而無治法不抑謬哉胞為血海已詳天癸條蓋血生於胃之水穀化液上肺奉心化血循衝任脈下入胞中既聚於胞中化精化血達於周身皆在於此參看天癸條自明膻中為氣海此有兩說一說丹田為氣海即胞宮也呼吸歸根之地名之為氣海亦宜詳膀胱三焦天癸營衛條此云膻中為氣海者蓋指氣之出納在乎肺也膻乃胸前大膜膈也膻之中即胸中只有心胞絡與肺故前云膻中者君主之官是指胞絡言此云膻中為氣海是指肺言以胞絡與肺均在膈內故均可名膻中也膻膈之與胞絡相通已詳十二官條此言與肺相通其道路又須詳言氣之根在臍下丹田即網油中一夾室也由網油走臍旁上生膈膜是為膻由胸膈循腔子上連肺系氣之出路即由此通於肺管故凡咳嗽則胸前癢滯皆膻膈間氣不得利也欲知膻之治法當參看肺腎三焦包絡條胃為水穀之海水主化氣生津谷主化液生血一則糟粕入大腸一則餘瀝入膀胱另詳腸胃膀胱各條脾與胃互為功用又須看脾之作用胸腹者臟腑之郭也胸內最上為肺肺下為心為包絡包絡上連肺系肺系連腔內之薄膜其膜循腔子而下是為膻膈大膜繞肋骨一周連於肝附於脊肝體半在膈上半在膈下膈附於脊下行為板油連於腎系又下為網油網油上行而連於小腸胃下行而連於大腸膀胱是為腹中也脾在胃後貼胃居網油上網油即三焦也上胸下腹均從網油連及以為臟腑之道路故曰胸腹者臟腑之宮城也以部位言之胸上屬肺胸膺之間屬心胸膺之下屬胃大腹與臍屬脾臍又屬小腸臍下屬腎膀胱亦當臍下故臍下又屬膀胱大腸在膀胱之後故臍下又屬大腸宜詳其層次也血室乃肝所司血室大於膀胱故小腹兩旁謂之少腹乃血室之邊際也屬之於肝少腹上連季脅亦屬肝季脅上連肋骨屬膽分別部居各從其位腹與胸分三停上停名胸在膈上心肺包絡居之心與包絡從著脊處油膜中下通肝腎肺有薄衣連及胸內前面之膜為肺通中下焦之路肺繫上連包絡後著脊前連胸膈肝體半在膈上半在膈下胃附肺系透下膈橫曲如袋胃下為小腸為大腸為肝膽是為中停皆生連油膜之上即中焦也臍以下為下停有膀胱有胞宮有直腸皆生連油膜上即下焦也後世不知焦從膲因不知通身之膜皆是三膲故讀經文者少識精義西醫曰腹內統膜一麗腹裡一包臟腑一成筋以束臟腑肝胃脾小腸大腸橫回直腸上截子宮蛋核此被全包如大腸頭小腸頭大腸上下回直腸中陰道膀胱此不全包如左右腎此被遮過專包一臟曰包膜兼包兩臟曰連膜摺疊成筋以束臟腑曰筋膜西醫言膜如此其詳證以三焦之說而精義始出膻中者心主之宮城也前言膻中為氣海是指肺言此言膻中為心主之宮城是指包絡言膻為膈包絡居膈之中故曰膻中為心主之宮城相心宣化詳十二官條此胸下一層膈膜後著脊左右連筋骨盡處中葉連胸之鳩尾即膈是也膻之下層通腹中膻之上層為胸內之薄膜連心系名包絡又名心主包絡是心外衛膻中是包絡外衛其形難圖故只圖膽以明之究膻之根附脊骨與肝系相連而下乃連及腎系是三焦少陽所發出而布於膈也胃者太倉也胃主納穀故名太倉胃之所以能納穀詳十二官條咽喉小腸者傳送也咽喉居胃之上傳送而入小腸居胃之下傳送而出二者皆為胃之使故治咽喉與小腸宜以胃為主胃五竅者閭門也醫林改錯言胃有三竅上下竅納穀傳入小腸又有一竅出水入油膜西醫言胃通體均有微竅行水入連網豫已詳胃三焦條茲云五竅其義尤詳蓋上竅主納水穀者也下竅入小腸主化谷之糟粕也旁竅入三焦膜油之中主行水之餘瀝也中通於脾為一竅所以化水穀者也上輸於肺為一竅所以布精汁者也故云胃五竅者閭門也唐宋以後無人知之即西醫剖視又何嘗精細似此西醫言胃有肝膈大筋胸膈大筋互相牽住使不得動不知胸膈筋是互通三焦之竅肝膈筋是循脊上肺通心之竅內經所謂胃有大絡上通於心也又曰脾之與胃以膜相連故又通脾西醫識其形而未明其理也廉泉玉英者津液之道也二穴在舌下足少陰腎主化氣上行氣即水也故氣之所至皆是津液腎津必上於口然後氣澤能布於下仲景傷寒論以存津液為主亦以其氣化所存人賴以生也可不重歟二穴舉舌即可逼視不必再圖腰脊者身之大關節也腰為腎系所貫脊為髓筋所通人身骨節皆主於腎而生於髓腰脊為腎與髓所在故為身之大關節凡治骨節當知所主矣西醫脊骨折剖甚詳然不知脊所重者全在於腰也且全身大骨皆從腰發原不知腎主骨之理則辨骨無益肢脛者身之管以趨翔也肢是手節脛是足節其骨最大中空故名管管中有髓及脂以主運動故能趨翔西醫言手足骨中之髓與腦脊之髓不同謂其中雜脂油也不知由腦脊散達肢脛皆以筋肉相連肉內有脂油即附之而入骨是以手足骨中均雜脂油脂脾所司髓是腎所司兼脂油是脾腎合致其功故脾主四肢腎主肢脛西醫圖四肢之骨詳矣惜未知其所統屬則治法不明莖委者身中之機陰精之候津液之道也莖陰莖委垂卵也機如泰西機器之機所以出精行溺精竅通於腎西醫謂睪丸主生精非也內宮太監無睪丸友人王東樵覿面問過太監亦有精能泄出可知睪丸非生精之物內經明言陰精之候蓋指此耳溺竅通於膀胱膀胱者津液之府故溺竅名為津液之道究之莖委乃肝之宗筋肝脈所繞也故皆以治肝為主宗筋主束骨而利機關故人身之機關皆聽治於此西醫圖陰器甚詳然此等物事人人皆自具之何待詳圖但西醫以剖割為治此處為地無多非詳不能下手若內經仲景之法針藥靈妙無取刀割之粗故不須圖且西醫圖之而究不知陰器所主之妙理也咽喉者水穀之道也咽喉乃胃之上口在喉嚨之後主進水穀故治咽以胃為主病在咽則水穀不得下喉嚨者氣之所以上下者也肺之上管為喉嚨在咽之前主氣之呼吸氣不利聲音不利病在喉也西醫名為總氣管自肺以下分支入腎透入丹田主吸天陽薰蒸膀胱之水化氣上出循腹至胸從肺衣而復歸於總氣管氣從前面出從後面入而皆由總氣管故曰所以上下也會厭者音聲之戶也會厭在喉咽之兩旁能張能收食入則收掩其喉音出則張開故曰音聲之戶乃喉之門也當屬肺西醫名為聲管前為會厭後為瓢韌骨兩旁皆有內皮中襯筋膜收放出聲四圍有數十小核生涕以潤聲管又云有上下二筋下筋緩上筋緊收放出聲內經云風寒客於會厭則暴啞正此筋不能收放也口唇者聲音之扇也唇開合而後語句清明故曰聲音之扇口唇屬脾故有脾中風唇緩失音之證舌者聲音之機也舌者心之苗言為心聲故舌能辨音究音之所故生則後能發音機者謂其伸縮轉掉聲只是響出於喉音則分宮商徵角羽其辨在舌腎津上廉泉至英穴以出於舌則滑利聲清舌屬心火賴腎水濟之腎脈絡舌所以轉舌也懸雍垂者音聲之關也喉間之上齶有如懸雍之下垂俗名帝丁音從此出故曰音聲之關此屬之肺余見啞人皆無齶上帝丁蓋會厭大張無關閉則氣不收束氣散而不能成音也俗名咽舌謂食入則掩其喉不令水穀入內也然啞人無帝丁水穀亦不得入氣管中則帝丁者實主音聲而為之關鍵也居氣管之口當屬於肺頏顙者分氣之所泄也頏顙即上齶氣從此分出於口為唾分出於鼻為涕故曰分氣之所泄也橫骨者神氣所使主發舌者也橫骨在舌本心存神而開竅於舌故橫骨為其所使以為發舌之機此數節詳論咽喉口舌發音之道可以得治法矣此西醫所圖名環韌骨在會厭之下當會厭又有半邊韌骨名為會厭韌骨與舌根相連主發舌者也韌骨以膜相連又有筋牽之最靈動以供心神肺氣之所使神與氣當分論五臟六腑之精皆上注於目前言肝開竅於目言其大要也此言五臟六腑之精皆上注於目則分析更微矣夫肝脈入腦通於目系故開竅於目至五臟六腑所以通於目者西醫云腦氣筋通各臟腑據此則各臟腑之精循腦筋而上注於目也骨之精為瞳子瞳神屬腎故其色極黑腎主骨故曰骨之梢為瞳子凡病瞳子多是腎虛筋之精為黑眼肝主筋肝之精汁上注為眼黑珠眼科書謂之風輪亦以肝主風也治黑珠當以肝為主血之精為絡白珠外有紅肉裹之而結於大眼角內者即絡也乃血之精屬之於心凡起血翳均當治心血氣之精為白眼氣屬於肺白眼生病多是肺受濕熱肌肉之精為約束約束即眼皮乃陽明胃脈所繞為脾經肌肉之精所結聚凡是腫爛澀癢皆脾經風濕熱也裹結筋骨氣血之精而與脈併為系上屬於腦後出於項中此又總言目系入於腦中而通於腦後以見五臟之精全由腦入目可以知治目之路徑矣大指治氣輪血輪肉輪藥氣可由喉嚨頑顙而上通於腦其路最捷易治治黑珠必循肝脈而上入於腦其路略深治瞳子必由腎督脈而上入於腦其路更深未易治也西醫有衣筋肌折之辨亦云詳矣然不能分出臟腑所屬則不得其治法惟內經五層眼皮為肉輪紅筋絡之為血輪白珠為氣輪黑珠為風輪瞳子為水輪分此五臟則義有所歸再者目系入腦而貫項後所以瞳人反背腦後可針雖西醫未究到此諸脈皆屬於目太陽脈終目內眥少陽脈終目外眥陽明脈繞眼終目下承淚穴厥陰脈入腦而交於目系腎之督脈入腦通於目系手少陰心之脈其支者上挾咽系目系惟太陰之脈不上於目故曰諸脈皆屬於目諸髓皆屬於腦西醫言手足骨中之髓與腦髓不同不知實發源於腦髓散走諸骨每骨節有筋脈油膜相連故諸骨中之髓雜有油膜血絲其實諸髓皆屬於腦而腦髓又生於腎也諸筋皆屬於節節者骨節也骨屬腎水筋屬肝木水生木故骨節之間亦生筋而筋又為骨之使也凡病骨節皆責於筋西醫詳骨與髓而於筋甚略因彼但以運動屬之腦氣不以為筋所主也然使無筋則骨不聯屬又烏能運動哉諸血皆屬於心血有肝藏脾統之說然運行在脾斂戢在肝而生復周回均在於心觀西醫血管圖可知諸血皆屬於心詳心生血條諸氣皆屬於肺氣之源在腎詳膀胱天癸營衛條而此云屬肺者以氣之總管在肺故肺主制節司腎氣之出納而又制節肝氣使不得逆制節脾氣使不得泄制節心氣使不得越肺之氣治而各臟之氣皆治矣人之血氣精神者所以奉生而周性命者也人之知覺性也人之生死命也性在心故字從心命在腎故腎系曰命門有此性命人乃得生其所以奉生而周於性命之間者則又賴乎精神神藏於心性之所在也精藏於腎命之所在也究精所由生則是氣之變化究神所由生則是血之功用故先言血氣從言精神而推極於性命中國注家尚多囫圇何況西醫之泥於跡者哉詳心腎各條經脈者所以行血氣而榮陰陽濡筋骨利關節者也內經名脈西醫名管其實一也西醫詳繪管竅然不能分出經名不知十二經與奇經八脈達於周身以行血氣使內陰外陽筋骨關節無所不周病則按經施治自然得效經脈以行氣血則不得單指血管言也按西醫有脈鞘是連膜或筋膜包裹脈管回管腦筋不等內經所謂經脈亦非西醫所能盡見比如督脈是行氣者也比如任脈是行血者也二脈已顯然不同安得執西說之死法以衡之衛氣者所以溫分肉充皮膚肥腠理司開闔者也衛氣已詳營衛條分肉即在內之赤肉與外之白肉有分別者也衛氣由內達外先從分肉而出以溫分肉後肉皮膚最外一層陽氣由內充於外以衛皮毛此為衛氣之能事也詳膀胱營衛條腠理乃分肉之外皮膚之內油膜是也有皺紋故曰腠理內發於三焦乃衛氣所行之道路故氣足則肥衛氣晝行於陽則目張而寤氣達於外不畏風寒夜行於陰則目閉而寐氣斂於內故必擁被以衛陽入里則畏外寒也此皆衛氣司開闔之驗詳營衛太陽各條西醫不知也此西醫汗管汗核圖也言汗管或藏腠中或隱腠下纏如螺絲透至皮膚外而汗出焉然西醫不知汗所從生實在膀胱化氣由三焦連網以達於皮毛也凡人暑時飲水多出汗亦多而小便反少是水從皮毛而瀉則不下走膀胱足見汗之根源生於膀胱為衛氣之所發泄此西人用顯鏡託大毛皮之形毛根附近有油核是血脈散於膜中而成者也又有汗核汗管附毛而生蓋毛皆為血之餘而非血所生也血從氣化隨衛氣達於腠理然後發出故拔視毛根只見油與水而不見血也志意者所以御精神收魂魄適寒溫和喜怒者也此又言重脾腎二者一主先天一主後天為人身之本也腎藏志志定則足以御腎精御心神使不得妄動志定則足以收肝魂收肺魄使不得妄越脾藏意主思慮故能令寒溫適其宜喜怒和其節志之與意不綦重哉西醫但以知覺全歸於腦而七情不分性命不辨彼之志意與中國同而何嘗知志意所司哉是故血和則經脈流行營覆陰陽筋骨徑強關節清利矣女子經脈不流行則月信錯亂周身作痛男子雖無月信亦有經脈不流行之證內外陰陽十二經脈皆血所營周覆禱者也筋骨關節皆血所貫注者也故必血和而後能流行營覆必血和而後能徑強清利反此者皆宜理血此論營血西醫有血脈圖然但圖血出之道未圖血回之管又不能分出十二經脈無當於治故不載之夫彼所以不圖回血管者以一來一回紛而難辨也夫彼既有難辨之處宜其不知經脈之說也此西醫脈管圖只是血運行而出之管非回血管也西人執此辨中國十二經脈及奇經八脈以為無其事也醫林改錯亦謂經脈無憑不知彼皆剖割死人安能復辨經穴且經道非血管也故內經言某經多血少氣某經多氣少血足見經道統血氣而言不得以血管氣管當之也西醫言人別有自和腦筋隨各臟腑而異用或包筋包骨包血管包氣管或散或合西醫此說似即內經所言之經道惜西人不通華文於內經未深考也況任脈專主血督脈專主氣安得以血管當經脈之說哉衛和則分肉解利皮膚潤澤腠理致密矣此論衛氣已詳上及膀胱條志意和則精神專直魂魄不散悔怒不起五臟不受邪矣志和則先天腎無病意和則後天脾無病故有此效詳上寒溫和則六腑化谷風痹不作經脈通利肢節得安矣此節與上相聯乃申明脾藏意適寒溫之義寒溫和則脾氣衝和故六腑能化水穀脾主肌肉不作風痹等證脾統血主肢節和則皆得通利而安矣卷首詳論臟腑其有未經論及者皆補於此人身之氣化形質已賅備矣雖西醫剖視而亦不及內經之精五臟所傷人必臟腑血氣先有虧損然後生病故論病機先言五臟所傷憂愁思慮則傷心心為火臟火氣宣明則能化生血液流暢筋脈血脈流行則其志常喜若反乎喜而為憂愁思慮則心氣遏抑火鬱血滯故傷心也治宜宣達心陽通暢血脈又常以喜勝憂慮斯愈矣形寒飲冷則傷肺肺金畏火自然懼熱此又云畏寒冷者何也蓋肺之體雖是陰金而肺之用實主陽氣氣布於外則為衛陽以充皮毛若衣服失宜外形受寒則皮毛灑淅漸入腠理發熱動飲為咳喘等症治宜溫散氣布於內則為宗氣以司呼吸散津於脾下輸膀胱若飲水漿果瓜之屬多受冷氣則陽氣不能布化水飲停積為咳喘癖痛等症治宜溫降悲怒氣逆則傷肝悲者肺主之過悲則金來剋木木不能達怒者肝主之過怒則肝木橫決血不能靜二者皆逆氣也肝乃主血之臟血之所以流行不滯潛伏不動者全賴氣之和平有以配養此血耳今其氣逆則血逆肝木鬱於下肝火犯於上而肝受傷矣悲則肝木鬱於下宜辛以升散之怒則肝火犯乎上宜苦以降解之然總以養和神得其平為要飲食勞倦則傷脾飲所以潤脾過多則停飲為濕發為脹泄痰咳之證土能治水而反為水所困也宜滲利食以養脾過多則停食為泄為滿脾能化食而反為食所困也宜消導脾主肌肉勞以運動肌肉使其活潑乃益得安然勞至於倦必致消瘦發熱蓋動而生陽傷脾之陰故肌肉反受其病治宜填補靜養久坐濕地強力入房則傷腎腎中之陽能化濕氣則水達膀胱氣行肢脊若久坐濕地則濕氣太甚而腎陽反受其傷必生肢脊疼腫等證治宜燥之腎中陰精充足無損則能種子入房乃其常事若力已竭而猶勉強入房則腎精枯矣治宜滋補五臟所惡五臟各有氣化即各有性情有性情即有好惡知其所惡即知治之之法心惡熱世傳五臟辨法謂肝熱筋灼驚癇瘈瘲肺熱咳嗽氣上口渴脾熱肉消便祕潮熱腎熱骨蒸精枯髓竭又上焦熱則心煩口渴頭咽目痛中焦熱則飲食減少腫脹痢瘧下焦熱則小便不利大便失調熱之見證雖不一而總之歸於心經蓋心為火臟凡是火熱皆心所司心化血以養火則火不亢而熱除若火太亢則心血受傷故心惡熱凡治熱證無不用苦藥所以治心之火也西醫見熱病即以水置胸前此熱輕者可以立刻徹去若熱重者外被冰阻則熱反內攻為熱毒伏心而死現在香港疫證為西醫十治十死皆此之故也所以港人逃避然則西醫亦當知變計矣肺惡寒肺氣如天居至高布陽氣故在外則皮毛畏寒恐傷其衛外之陽在內則胸膈惡寒恐傷其布護之氣寒傷皮毛發熱咳嗽寒傷胸膈停飲痹痛肝惡風肝木主風而即惡風蓋血得和氣則流暢血得邪氣則消灼凝結老人中風小兒驚風一切風濕麻木瘙癢痙癇蓋無一不當治肝即無一不當養血誠以風乃陰中之陽血中之氣故惟風能鼓蕩其血亦惟血能調養其風脾惡濕飧泄洞泄痞滿腫脹水飲等證皆是濕氣有餘脾土不能克化五行惟土能制水土勝則水受制水勝則土無權故脾能治濕而反惡濕脾居油膜之上膜屬三焦行水之道油屬脾水遇油則滑利不留此即脾所以制水也若水太多則油反受其浸漬當分寒濕熱濕以燥利之腎惡燥腎主藏精下通水道上發津液總系陰精之所運化者也燥則傷其陰精骨髓枯津液少水道乾澀必用滋潤之品庶幾腎水得養以上二條經文最簡略然包括之病甚多但能觸類引伸便可通一畢萬臟腑為病五臟六腑病形百出然各有自為之病形以為證據如心為噫非心止有噫之一證謂無論何證但見噫氣則知屬於心矣余仿此心為噫噫者胸中結氣哽之使出俗說是打格頓非也打格頓與噫音義不符打格頓是氣厄於胸而出於口故名曰厄二者均病在胸前屬心之部位故皆屬心經柿形象心而蒂苦澀治厄降心氣也胸滿噫氣乃是肺胃痰火仲景旋覆麥冬治之而必用赭石破心血鎮心氣也久病聞厄為胃絶則以其火不生土心氣逆也心病不止一噫然見噫氣便知屬心用藥乃知方向肺為咳內經言五臟六腑皆有咳證而無不聚於胃關於肺蓋肺主氣管氣管中非痰飲即風寒火燥令其氣逆故咳有從皮毛口鼻入氣管者有從腸胃膈膜入氣管者當分頭治之按齁咳二證道路不同鼻主吸氣齁字從鼻是吸入之氣管不利此管詳膀胱肺腎條咳字從缺缺者口氣下垂也口主出氣是呼出之氣管不利此管在胸膈故每咳必胸前癢滯詳三焦條肝為語譫語屬陽明燥熱鄭聲屬心神虛恍而此云肝為語蓋燥熱乃木火剋土神恍乃肝魂不清因而心神擾惑故皆宜瀉木火安魂也脾為吞脾主化谷生津凡口中津液少者時常作吞引之狀反吞為吐又是水穀不下之故皆屬脾病可以互勘腎為缺為嚏缺者陰引陽入故呵缺至而欲寐嚏者陽引陰出故噴嚏出而人醒二者皆根於氣海故腎病則見此二證胃為氣逆為噦為恐陽明主納其氣以下行為順氣逆則反其令也衝脈麗於陽明沖逆亦屬陽明胃噦者吐穢惡之氣也吞酸噯腐之類皆反其納物之令也恐者腎所主腎水動而胃土不能制之故恐亦屬胃大小腸為泄泄多是脾胃中焦之證然總出於腸中故皆屬於大小腸之病小腸屬火以化谷火虛則穀不化而飧泄大腸屬金以燥糞燥氣不足則糞溏瀉小腸火甚則又膠結為痢大腸燥糞則又祕結不便此又為泄之變態矣下焦溢為水腫三焦乃決瀆之官前已詳注此但云下焦者因上焦連心肺中焦連脾胃多兼心肺脾胃之證尚非三焦專責惟下焦當膀胱上口為水入膀胱之路此處不利則水溢於上達於外而發水腫下焦屬腎屬肝治宜疏泄肝腎又肺居高能御下主通調水道非開利肺氣不能治下焦也膀胱不利為癃不約為遺溺膀胱下為溺管溺管淋澀不通為癃肺主水道由肺氣閉則宜清利肝脈繞莖由肝血滯則宜滑利據西醫之說以為溺管發炎腫塞或砂淋內塞究之皆肺肝兩端所致也又溺管之後為精竅精竅有敗精死血亦能擠塞溺管法當利腎夫肺以陰氣下達膀胱通調水道而主制節使小便有度不得違礙肝腎以陽氣達於膀胱蒸發水氣使其上騰不得直瀉若陽氣不能蒸發則水無約束發為遺溺治宜溫胞室蓋膀胱如釜胞如灶溫胞室者釜底添薪也參看十二官條自見膽氣鬱為怒膽者木生之大也西醫論膽專言汁不知有汁即有氣故內經均以氣立論木氣條暢火氣宣達則清和朗潤其人和平若木鬱生火火鬱暴發則為震怒凡病之易怒者皆責於膽氣也臟腑之證不一而足舉此為驗任其證形百變均莫得而遁情矣諸病所屬屬者所統屬也知其所屬則綱領既得而其條目可例求矣諸風掉眩皆屬於肝肝為風臟凡風病皆屬於肝諸風謂中風傷風驚風癘風之類所該之證多矣掉謂轉動凡猝倒痙癇抽掣搖戰之類皆是肝主筋此皆筋之為病也眩是昏暈凡昏花妄見頭目旋轉皆是肝開竅於目故有此病也西醫謂目眩惑昏花痙癇抽掣皆腦髓筋為病謂目系通腦故昏眩腦氣用力太過則肉縮伸抽掣究問腦氣何故病此則西醫茫然豈知肝脈通於腦開竅於目而土筋凡西醫所謂腦氣皆肝脈所司而脈筋所以致病則又肝風為政也故凡掉眩皆屬於風而諸風為病總屬之肝諸寒收引皆屬於腎腎司寒氣故凡寒證皆屬之腎腎又主骨腎陽四達則骨體舒展舉動輕便若肢骨拘急而收曲或軃緩而引長皆骨不為用也須知拘收引軃與抽掣縮短者不同一是寒症一是風症當辨諸氣膹郁皆屬於肺五臟六腑之氣無不總統於肺以肺為氣之總管也故凡治氣皆當治肺肺立皮毛膹是氣之乖於皮毛者膹膗也說文謂形惡如紫癜斑瘤黑痣疱鼻之類西醫言毛孔下有油核其管直通皮膚若面生黑刺即管塞之故此即內經膹膗之說也郁是氣遏於內不得舒發也見病如氣逆痰滯血結便閉之類是氣之乖於腹內者郁與暢反肺氣不暢故郁宜散降之諸濕腫滿皆屬於脾腫在皮膚四肢滿在腹內脹塞皆濕氣壅滯水不下行停走於膈膜中也然濕證尚不止此故曰諸濕或頭目暈沉或瘧暑泄痢或周身痹痛或痰飲痃癖皆屬脾土不制水所致蓋脾生油膜之上膜是三焦主水道油是脾之物油不沾水此脾所以利水也若脾之油失其令則濕氣乃得藏匿故治濕責之於脾諸痛瘡癢皆屬於心此言諸瘡或血分凝結阻滯其氣氣與血爭則痛或血虛生熱兼動風氣風火相扇則癢皆屬心經血分為病治宜和血又凡病不幹血分皆不發痛故痞臌腫等均不痛凡是腹痛肢體痛蓋無不關於血分故皆屬心諸熱瞀瘈皆屬於火諸熱謂發熱惡熱瘟暑等症瞀謂眼目昏花黑暗見鬼等症瘈謂筋不得伸抽掣等證皆屬於火者蓋諸熱是火傷氣分火克肺金也瞀是心神擾惑視物昏亂火屬心心臟火擾其神故瞀瘈是肝筋為火所灼無血養筋故縮扯瘈與軃緩不收有異當辨之諸厥固泄皆屬於下厥謂四肢逆冷固謂腹中瘕積如寒疝之類瀉謂下利不止皆屬於下謂屬於下焦腎經也腎陽不能四達則厥腎陽不能上升則瀉腎陽不能化氣則固結故皆屬於下宜溫之也諸痿喘嘔皆屬於上痿有兩證一是肺痿肺葉焦舉不能通調津液則為虛勞咳嗽一是足痿脛枯不能行走則為足痿然未有足痿而不發於肺者蓋肺主行津液由陽明而下潤宗筋足乃能行肺之津液不行則宗筋失養故足痿雖見於下而亦屬之上焦也喘屬肺之呼不利嘔屬胃之飲食氣逆肺胃均屬上焦上焦屬陽多病火逆宜清之也諸禁鼓栗如喪神守皆屬於火禁謂口齒禁切噤口痢痙病口禁之類鼓栗謂鼓戰栗如瘧疾手足搖戰之類如喪神守謂譫語百合病恍惚不安之類蓋熱極反寒之象火擾心神之徵皆宜治其火也諸痙項強皆屬於濕寒濕則筋脈凝熱濕則筋脈脹故皆能發痙與項強之證諸逆衝上皆屬於火諸逆謂吐咳嗆嘔等凡是衝脈氣逆頭目咽喉胸中受病均繫心肝之火挾衝脈上行也宜抑之諸脹腹大皆屬於熱諸脹謂腹內脹滿腹大謂單腹脹此證是肝不疏泄脾不運化肝不疏泄則小便不利水停為脹脾不運化則單腹脹皆屬於熱者屬於肝木乘脾也然此與上節火字有別火屬血分熱屬氣分熱則氣分之水多壅故主脹大諸躁狂越皆屬於火躁謂煩躁狂謂癲狂越謂升高踰垣凡此皆三焦與胃火太甚而血氣勃發也諸暴強直皆屬於風強直僵仆倒地暴者猝然發作風性迅速故能暴發凡風均屬之肝肝屬筋脹風中筋脈不能引動則強直矣風者陽動而陰應之也故風俱陰陽兩性中風之陰則為寒風中風之陽則為熱風無論寒熱均有強直之證宜細辨之諸病有聲按之如鼓皆屬於熱此與腸鳴不同腸鳴則轉氣切痛下泄屬水漬入腸發為洞瀉是寒非熱也此有聲乃在人皮里膜內連網油膜之中凡人身連網油膜均是三焦乃相火之府行水之道路也水火相激往往發聲但其聲綿綿與雷鳴切痛者有異按之亦能作聲又拒手如按鼓皮以其在皮膜間故按之如鼓是三焦之火與水為仇也故曰皆屬於熱蓋三焦為行氣之府氣多則能鼓吹其膜中之管使之有聲如西洋象皮人搦之則出聲是矣諸病跗腫疼酸驚駭皆屬於火跗足背凡足腫皆發於厥陰陽明兩經陽明之脈行足背厥陰之脈起足大指叢毛行內踝肝木生熱壅遏胃經之濕則循經下注而發足腫極痠疼也酸字頗有實義西醫云凡腳氣必胃中先釀酸水繼而尿中有蛋白形尿味亦酸乃髮腳腫痛但西醫未言所以致酸與因酸致腫之故惟內經理可互證經云肝木在味為酸蓋木能生火木能剋土土不化水火又蒸之則變酸味是酸者濕與熱合之味也羹湯夏月過夜則酸濕遇熱也冬月則否有濕而無熱也知酸所以致疼腫而腳氣可治矣又凡乍驚乍駭皆是肝經木鬱火發魂不藏之故是以皆屬於火諸轉反戾水液渾濁皆屬於熱轉者左右扭掉也反者角弓反張也戾如犬出戶下其身曲戾即陽明痙病頭曲至膝也水液渾濁小便不清也轉在側屬少陽經反在後屬太陽經戾在前屬陽明經水道在膈膜中屬三焦經皆屬於熱是水液渾濁固屬三焦之熱而諸轉反戾亦當同屬三焦矣三焦網膜西人謂之連網由內達外包裹赤肉兩頭生筋以貫赤肉筋連於骨節故利曲伸觀此則知轉反戾是筋所牽引實則網膜伸縮使然故內經與水液同論以見皆屬三焦網膜中之熱也西醫乃謂抽掣痙等發於腦筋不免求深反淺故西人無治之之術也諸病水液澄徹清泠皆屬於寒下為小便上為涎唾其道路總在三焦膜膈之中無論何證但據水液有澄徹清泠之狀即是三焦大虛之候故曰皆屬於寒諸嘔吐酸暴注下迫皆屬於熱嘔謂乾嘔是火逆也吐有寒證吐酸則無寒證暴注下迫裡急後重逼塞不得暢俗名痢證皆屬於熱者屬於肝經之熱也肝火上逆則嘔吐酸肝火下注則痢下迫因肝欲疏泄肺欲收斂金木不和故欲瀉不得且痢多發於秋金剋木也病機百出未能盡録但舉其凡以例其餘四時所病四時各有主氣客氣五方強弱之異茲所舉者不過明臟腑氣應與天時並行之義耳醫者當知隅反春善病鼽衄鼽是鼻塞流涕衄是流鼻血鼽屬氣分春陽發泄為陰所閉則鼻塞不通治宜疏散其寒衄屬血分春木生火動血上衝干犯清道鼻為肺竅木火侮肺故發衄治宜清降其火善病者謂多此種病也仲夏善病胸脅胸是兩乳中間屬心脅是兩乳旁邊屬三焦心是君火三焦是相火皆與夏氣相應故仲夏善病胸脅以火有餘多發逆滿也長夏善病洞瀉寒中長夏未月濕土主氣脾主濕而惡濕濕甚則發洞瀉陽極於外無以溫養中土故發寒中之病觀冬月井水溫夏月井水冷則知夏月中宮多寒矣秋善病風瘧風屬肝瘧屬少陽因風致瘧本系木火為病而多發於秋令者木火侮金也蓋秋當肺金主氣之時金氣清肅則皮毛自斂膜腠自和設風氣鼓動則為皮毛不得斂而發寒熱風火相煽則膜腠不得和而戰栗溺赤知此理者可得治瘧之法矣冬善病痹厥痹是骨節疼痛厥是四肢逆冷腎中陽氣能達於骨節充於四末則無此病冬令寒水氣盛往往腎陽不足故多此病四時之病不一而足則此種為多且知其理而一切非時之病理皆可識臟腑通治心與膽通心病怔忡宜溫膽為主膽病戰栗癲狂宜補心為主舊注君相二火一氣相通此解通字與以下各通字不合蓋所謂通者必有相通之道路唐宋後憑空說理不按實跡西醫雖詳形略氣然如此等道路非借西說不能發明西醫云人之臟腑全有連網相聯其連網中全有微絲管行血行氣據此則知心與膽通其道路亦在膜網之中蓋膽附於肝肝繫著脊上循入肺系連及於心膽與心通之路即在其系中故心病怔忡宜溫膽膽病戰栗癲狂宜補心非空論矣又溫字補字有辨經言溫之以氣補之以味內經言以苦補心是瀉心火即是補心以益其陰也溫之以氣是益其陽也肝與大腸通肝病宜疏通大腸大腸病宜平肝經為主肝內膈膜下走血室前連膀胱後連大腸厥陰肝脈又外繞行肛門大腸傳導全賴肝疏泄之力以理論則為金木交合以形論則為血能潤腸腸能導滯之故所以肝病宜疏通大腸以行其鬱結也大腸病如痢症腸風祕結便毒等症皆宜平肝和血潤腸以助其疏泄也脾與小腸通脾病宜泄小腸火小腸病宜潤脾為主西醫圖繪脾居連網之上小腸通體皆與連網相附連網中均有微絲管相通據此則內經所言道路顯然西醫不知內經妄詆軒岐以為未見臟腑此不足怪獨怪中國趨好洋學舍古聖之書而弗深考豈不謬哉脾病多是小腸之火蒸助濕氣發腫脹作瀉滿小便渾濁故當瀉小腸至於小腸所以化物不滯全賴脾濕有以濡之西醫所謂甜肉汁入腸化物是矣故小腸病痢及祕結闌門不開膈食等症皆宜潤脾肺與膀胱通肺病宜清利膀胱水膀胱病宜清肺氣為主肺主通調水道下輸膀胱其路道全在三焦膜中上卷已詳言之故肺與膀胱相隔其遠而實相通肺病則水停為痰飲故宜清利膀胱以瀉之膀胱病多由肺之上原不得疏通故宜清肺氣為主腎與三焦通腎病宜調和三焦三焦病宜補腎為主三焦之原即發於腎系故腎與三焦相通三焦為腎行水化氣故腎病宜調和三焦譬如腎氣丸用苓澤以利三焦之水保元陽用黃耆以充三焦之氣是矣三焦病不能行水則宜滋腎陰不能化氣則宜補腎陽近醫不知三焦為何物西醫名連網不名三焦且又不知腎係為三焦之根安知人生氣化哉此條全可考臟腑路道西醫形跡之學未及如是之精而今人不講反為西人所笑堪發一嘆望形察色形是肢體色是面部此理最微比脈更難今且舉其大略使人得其門徑西醫於察色未深考以五色命臟青為肝赤為心白為肺黃為脾黑為腎肝合筋心合脈肺合皮脾合肉腎合骨也言五色命於五臟每臟各見本色便知其病各臟又各有所合便知其病之所在譬如青色屬肝肝合筋便知其病在筋余仿此青如草滋者死青如翠羽者生黃如枳實者死黃如蟹腹者生黑如炲者死黑如烏羽者生白如枯骨者死白如豕膏者生此言五色榮者生枯者死蓋必有血與氣澤方能榮也凡色多青則痛多黑則痹黃赤則熱多白則寒五色皆見則寒熱也青為肝色青勝則肝木剋土故痛黑為腎之色黑勝則寒水凝滯故痹黃赤為火土之色故主熱白為金色令主清冷且溫體者血也血色少故白色多而知其體寒五色皆見乃錯亂之象故主寒熱並見明堂者鼻也闕者眉間也蕃者頰側也蔽者耳門也明堂骨高以起平以直首面上於闕庭王宮在於下極五臟次於中央六腑挾其兩側此言人面之部位分配臟腑以診其色也面分三停上為闕闕下為下極即山根也以闕論則處下合鼻言之則適居於中故稱極焉是為王宮心之應也鼻居王宮之下故名明堂其診法則當以五臟從上而下配於中央而六腑各隨其臟配於兩側有諸內形諸外亦各從其類也明堂今名準頭王宮今名山根闕今名印堂蕃今名頰蔽今名耳古人不剃鬚故不診頤下今診決有心額腎頤之說是俗醫所配雖今人剃鬚氣色終不見於此未可據以為診也人身內肺繫心系肝繫著脊腎系均著脊惟脾在胃下不著脊然脾膜之根仍在脊也故脾俞穴在背是五臟皆居於身中也所以診法亦配於面之中央而六腑則隨其臟位以配於側闕上咽喉也闕為眉間闕之上則至高矣咽喉之位在諸臟腑之上故應於闕上闕中者肺也俗名印堂肺居胸中高於五臟故應於此下極者心也下極即山根心居肺之下肺應於闕中則心當應於此直下者肝也相法稱為年壽即鼻梁也肝配於此者以肝在腹中半在膈上半在膈下位實在心肺之下故當配於此唐宋後醫以肝配左顴肺配右顴此西金東木之義然非五臟自具之位次也且舊說以為肝在脾之下故曰下焦屬肝腎不知水木相生肝固與腎相屬而究其形體所居則肝半在膈上半在膈下脾在膈下居於油膜之上近胃聯小腸也中醫少見臟腑多失其真而西醫笑之並謂軒岐先謬豈知古聖精核更過西人此等位次便見聖人審定臟腑最精至經脈穴道尤為西人所不知也今必謂古聖洞見臟腑尤屬空談不足折服西人即以剖視例之古創制作亦斷無未經剖視之理且軒帝戰阪泉涿鹿何難剖割之有圖見後肝左者膽也舉左以賅右言肝應於鼻梁其左右附鼻梁者膽之應也下者脾也下者指準頭言鼻梁在上則準頭在下故稱下焉脾在腔內實居肝之下油膜之上故應配於鼻梁之下此名明堂為脾之應脾能總統五臟故準頭之診最要方上者胃也方上二字不得其解舊說以為口之上鼻孔之旁余按方字義訓兩舟相併殆指鼻之兩孔其形如方舟也然則準頭為明堂而兩孔即方上也本經云五臟位於中央六腑挾其兩側則鼻準屬脾兩孔旁自當屬胃中央者大腸也此中央字當合頰側與鼻計之頰側距鼻之中為中央蓋頰側名蕃鼻準名明堂其中即可名中央胃近鼻大腸連胃位次亦宜挾大腸者腎也腎有兩枚故配於面部頰側兩旁是最下之兩旁也腎居於下配此為宜後人配於口下承漿之所不知古不剃鬚口下須掩氣色不見故內經不以此察色以腎配兩頰腎有兩枚分左右診於義為合當腎者臍也腎與臍前後相對故當腎之下即以診臍面王以上小腸也面王以下膀胱子處也面王二字無舊解然明堂者北面朝王之所也疑即明堂鼻準是矣膀胱子處即子宮二物皆在臍下與腎位相等腎兩枚居背後故分配兩旁應腎在後也膀胱子宮在前則當次位於前居鼻下故曰面王以下膀胱子處也惟小腸與胃相接而為心之府未易定其位次且小腸之膜油全連及肝膽脾也故配於膽胃之交肝脾之際位在鼻準上邊兩旁夾鼻之處故曰面王以上小腸也豫按後人望色左肝右肺心額腎頤鼻脾法甚簡易然不及內經診法為更詳闕屬肺闕旁生眉即當屬肺世多以眉屬肝不知眉實屬肺內經云肺風之狀其診在眉上足見眉實肺氣所發泄然肝血如不交於肺即不能化生眉毛凡毛皆是血化為氣而發泄者也單有血不能生毛單有氣亦不能生毛目之部位統屬肝竅所司由肝目之部上交闕旁系肺之所司矣為肝血上交於肺氣所以化生眉毛肺為華蓋故相書稱眉亦名華蓋肝木主怒侮肺金而難制故眉粗之人性最剛烈自闕至明堂分配五臟而以六腑配於兩側詳矣惟三焦包絡未曾分配余按經文義實具於言下蓋三焦為腎之腑腎位配於蕃正當頰側則三焦當配於蔽正當耳門也腎開竅於耳三焦之脈又統耳護腎竅以蔽診三焦自不爽也至於包絡配在山根兩旁其義更可類推散見於經文者如發上指汗出如油大肉脫大骨陷唇及舌卷囊縮鼻張不治之證未能悉舉但明臟腑相應之理可以通一畢萬且如眼神尤宜細察再讀傷寒金匱則盡知之聞聲別證聲音之道微妙難通故聞而知之謂之神肝木在音為角在聲為呼在變動為握心火在音為徵在聲為笑在變動為憂脾土在音為宮在聲為歌在變動為噦肺金在音為商在聲為哭在變動為咳腎水在音為羽在聲為呻在變動為栗已詳上卷五臟所屬條人能本宮角徵羽五音呼笑歌哭呻五聲以參求五氣之邪則思過半矣西人審病至於察尿之味亦云苦矣只因於聲音氣色未能辨析是以出此下策中盛臟滿氣勝傷恐者聲如從室中言是中氣之濕也言而微終日乃復言者此奪氣也言語善惡不避親疏者此神明之亂也經意甚明蓋即聞聲而知其神與氣焉病人語聲寂寂然喜驚呼者骨節間病語聲喑喑然不徹者心膈間病語聲啾啾然細而長者頭中病此數語系金匱文寂寂然不欲語屬三陰經喜驚呼則又屬厥陰肝經病入三陰厥陰主筋骨間知其病在下焦聲出不徹聲不揚也胸中大氣不轉出入艱滯知其病在中焦胸膈間啾啾然細而長聲自下焦陰分緣足太陽而上達於顛頂故知其病在頭中按聲氣根於腎中上於胸膈出於肺管達於鼻轉於舌辨於唇或氣虛而音微或機停而語蹇或膈間有滯而氣礙或鼻間有違而音乖散見各書細心人當自領取非筆楮所能盡也問察原委病家不可諱病醫家不可護短須察問其原委乃不昧於治法問嘗貴後賤雖不受邪病從內生名曰脫營嘗富後貧名曰失精必問飲食居處暴樂暴苦始樂後苦皆傷精氣此是問病之原由也問法不止於此當推類以求凡診者必知終始有知餘緒切脈問名當合男女此一節是總言察問之法必知終始謂起病及其終病形如何可全察矣有知餘緒有即又字餘緒謂其兼見之微證必兼察之乃知何者為重病何者為輕病或合治或分治可得言也再切脈問名以定其病之主名使無差爽男女各有不同又當合計各有病情病狀之實乃無誤矣此段問法甚詳在人細究附録陳修園問證歌括曰一問寒熱二問汗三問頭身四問便五問飲食六問胸七聾八渴均當辨九問舊病十問因再加服藥參機變婦人尤必問經期遲速閉崩皆可驗更添片語告兒科天花麻疹全占驗診脈精要察脈知病精之至矣然內經仲景皆合人迎趺陽合診今則獨取寸口蓋去繁就簡為得其要茲所引注皆獨取寸口之法十二經中皆有動脈獨取寸口以決五臟六腑死生之法何謂也寸口即今掌後診脈之所此難經發問以起下義近出西醫不知脈法即欲以此攻斥脈法謂周身皆有動脈何得以手之寸口為診彼蓋不知中國古人創立脈法已先自為問難所謂十二經皆為動脈者早已代洋醫說過早經駁辨彼西醫既不知脈何得侈口妄談哉然寸口者脈之大會手太陰之動脈也人一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸人一日一夜凡一萬三千五百息脈行五十度周於身榮衛行陽二十五度行陰二十五度為一周復會於手太陰寸口者五臟六腑之所終始故法取於寸口也近說肺朝百脈為華蓋五臟六腑之氣皆上薰於肺故即肺寸口之脈可以診知各臟其說亦通而究不知營衛相會為五臟所終始故獨取寸口越人立法甚精矣衛氣之行西醫不知營血之行西醫知之西醫云血出心管行於周身轉回則為紫色受炭氣故也回血入心路經肺管呼出之氣吹之紫色乃散復入於心此即內經營周於身之義矣無一息不有血出於心之左房即無一息不有血回入心之右房然計所出之血待其回入亦須一日一夜特營血之行與衛不同營血則息息皆有出有入衛氣之行則須行度一周乃復於肺而與營血相會此小會也蓋衛氣晝行於陽則寤夜行於陰則寐必晝夜各行二十五度乃復於肺而與營氣大會故營言周於身衛則言復會於手太陰文義顯別不可混也營氣周行臟腑內外而皆會於肺故獨取寸脈可以診臟腑內外諸病矣按靈樞云人經脈前後上下左右周身十六丈二尺一周於身為一度晝夜一萬三千五百息氣行五十度其經脈長短之數氣行傳遞之路皆詳於內經脈度營氣篇茲不具論觀其脈動與氣行分言則知脈是營血氣附脈行晝則行營外為行陽二十五度夜則行營內為行陰二十五度內經云老人夜不寐營血虛衛陽不得入於陰也觀此則知營衛相附之理營周而復始故無一息不返於肺以入心衛行必一度乃返於肺也其五十度則陰陽之數已行盡而返於肺則名曰大會臟腑之所終始也以其會於肺故即肺脈便可診臟腑諸病西醫不知營衛相會之處而但知脈是血管辨中國診脈之非只自形其粗淺耳從關至尺是尺內陰之所至也從關至魚際是寸口陽之所治也關者尺寸分界之地脈訣所謂高骨為是也關下為尺澤主肝腎而沉故屬陰關前為寸主心肺而浮故屬陽西醫不信脈法謂人周身脈管皆生於心中血管心體跳動不休脈即應之而動人身五臟何得只據血管為斷又言手脈只是一條何得又分出寸關尺此說似是而實非也細按手脈至魚際上則脈不見動至尺澤下脈亦不見動蓋脈雖一條而有分散合聚隱見之別寸口者脈之大聚會處為營衛相會之要區故即以此診諸病脈管內屬血分脈管外屬氣分遲數是脈管中事浮沉是脈管外事至於脈之前後又分寸為陽尺為陰蓋手脈既屬脈之都會自有部分之別陽外陰內天地不易之理凡主表主上主氣屬陽者皆診於寸主裡主血主下屬陰者皆診於尺也上部法天主胸以上至頭之有疾也中部法人主膈以下至臍之有疾也下部法地主臍以下至足之有疾也此即內經上竟上者胸喉中事下竟下者少腹腰足間事之義蓋天下之理本天親上本地親下各從其類故左寸在上應心右寸在上應肺左關在中屬肝右關在中屬脾左尺在下屬腎右尺在下屬命門總是分上中下之義其分左右者則以水為天一宜配在左火為地二宜配在右水生木木生火故心肝均位於左火生土土生金故脾肺均位於右各從其類義也至於六腑又各從其類以配次之肺之腑為大腸肺居右關上寸部則大腸宜配於右關下尺部矣亦有時診於右寸總見肺與大腸一家故也胃從脾配在右關三焦從命門配在右尺膀胱從腎配左尺膽從肝配在左關小腸從心配在左寸小腸亦可配在左尺以心位於左關之上則小腸當從之於下也臟腑之位次既明又推之於形體則喉舌頭面胸前肩膊皆診於寸部腋下腹際從腰以還皆當診於關部小腹尾尻二陰股脛膝腳皆當診於尺部此內經竟上竟下之法實大易親上親下之理其旨微矣辨證有分部診法有合三部共診法最要通其理方可言診西醫所不知也舊訣部位左心膻中肝膽腎小腸右肺胸中脾胃命大腸周夢覺三指禪脈法以為左心小腸肝膽腎膀胱右肺大腸脾胃腎命門然猶有未盡之義宜分為左寸心膻中小腸左關肝膽左尺腎膀胱及小腸也右寸肺胸中大腸右關脾胃右尺命門三焦及大腸也蓋大小腸或附於肺以其表裡相通也或附於兩尺以其居下也膻中即包絡胸中即肺衣古法不診三焦以未知三焦之根即在腎系今特配於右尺於義乃備脈有三部九候三部者寸關尺也九候者浮中沉也此與內經三部九候之法不同然頭手足遍診之法其廢已久故即從難經以寸關尺為三部三部各有浮中沉是為九候呼出心與肺吸入腎與肝呼吸之間脾也其脈在中浮者陽也心肺俱浮浮而大散者心也浮而短澀者肺也沉者陰也肝腎俱沉牢而長者肝也按之濡舉指來實者腎也脾者中州故其脈在中是陰陽之法也上節以部位分五臟此又以呼吸浮沉分五臟也心肺在上部出氣由之故呼出屬心肺一呼脈當二至也肝腎在下部入氣歸之故吸入屬肝腎一吸脈當二至也呼吸之間脾主中宮司出入脈當一至故呼吸定息脈來五至者為無病若多一至則有一臟太過若少一至則有一臟不足此察至數之法知此義則知至數遲速之故其脈在中以下又言以浮中沉分別五臟也言脈在人肌肉之中輕按即見為浮浮為在外屬陽心肺應之浮而大散其應在心浮而短澀其應在肺重按乃見為沉沉為在裡屬陰肝腎應之牢而長者弦之象屬肝經濡而實者滑之象屬腎經脾者中州故其脈在中是陰陽適中之地也此以沉診肝腎浮診心肺中診脾胃取配之義亦多方矣春脈弦夏脈鉤秋脈毛冬脈石四時皆以胃氣為本四時之變病死生之要會也鉤即洪毛即浮石即沉也胃氣見於脈乃和緩之象言弦鉤毛石各見和緩為有胃氣四時之變謂太過不及不得胃氣則可以知其病矣此詳言五臟四時之主脈而又歸本於胃氣近代三指禪脈訣以緩脈為綱誠能知胃氣為本之旨學者可以一覽數者腑也遲者臟也諸陽為熱諸陰為寒數則為熱遲則為寒腑屬陽故數脈當應腑臟屬陰故遲脈當應臟數則為熱諸陽主氣也遲則為寒諸陰主氣也夫以遲數分臟腑此未盡然而數則為熱遲則為寒蓋有一定不易者脈之跳動出於心血之起落屬脈管中血之所主心主火血虛火少則動遲血多火旺則動速又凡脈之粗大細虛皆脈管中事當與遲數同斷脈法要辨脈管內是血分脈管外是氣分則診治自有分別浮者陽也滑者陽也長者陽也沉者陰也短者陰也澀者陰也各以其經所在名病順逆也浮滑長為陽沉短澀為陰據此治病已得其要又再分各經以定順逆如腎脈宜沉而反浮心脈宜浮而反沉則為逆既明脈之定象又言脈無定體因經而分順逆其法最細西醫但知脈是血管而不知氣附脈行血管外即氣道也西醫云脈外有膜名脈鞘光滑而薄分數層中有小孔如篩按此即附脈行之氣孔也脈管只是一條動則俱動故遲數無部位之分氣則上下異其輕重也故浮沉有三部之別從此類推而氣管血管分診合診則脈無遁情余讀西醫書即益知古聖之精尤願西醫讀古聖書亦可補其不及也此診法全從難經蓋內經遍診頭足自越人變法而群趨簡易後世脈訣托始於此於法甚精故宜從之再參諸脈書則盡其奧矣審治處方寒者熱之熱者寒之微者逆之甚者從之堅者削之客者除之勞者溫之結者散之留者攻之燥者濡之急者緩之散者收之損者益之逸者行之驚者平之諸法以寒治熱以熱治寒攻散補平皆易知之惟微者逆之甚者從之此理極其微妙蓋微者如小賊可以撲滅甚者如巨盜巢穴深固非誘之不為功西醫如治熱證則以冰壓胸此熱者寒之之正法也然熱之微者可以立除如熱之甚者反逼激其熱使內伏入心而死香港疫症如此治死者多矣皆不知甚者從之也比如被火傷甚重則忌用冷水澆恐火毒伏心而死也然則逆從之法可不講耶逆者正治從者反治熱因寒用寒因熱用塞因塞用通因通用其始則同其終則異可使破積可使潰堅可使氣和可使必已逆者以寒治熱以熱治寒故為正治從者熱病從熱寒病從寒故為反治又言反治之理熱藥因寒而得其用寒藥因熱而得其用即所謂反佐之治也塞因塞用如滿逆不下從而吐越之通因通用如瀉痢不止從而潤降之其始則與病從同所以誘之其終則與病各異所以敵之也變幻莫測故可破堅積以期其必愈病在下取之上病在上取之下病在中旁取之此又言治病不可逐末當求其源委所在如小便大便不利病在下也然多是心肺傳移之病故當取之上頭目耳喉間病在上也然多是肝腎之邪上犯故當取之下病在中屬脾胃然多是少陽厥陰之邪所犯故宜旁取之治法之詳當求各書然能洞明內經大義則各書治法其理已具西醫言治多執著故鮮神妙氣味陰陽西醫言彼國用藥歷試而知較有實據不比中國專以色香氣味分配臟腑則影響無據矣不知西醫此說適形其陋曰歷試則毫無把握惟憑嘗試矣彼惟不論五行專以形氣立說所以得半遺全譬如彼言養氣能養物百果羹肉得養氣皆不壞取養氣以水銀白礬硝石燒之即出不知彼所謂養氣即中國所謂陰氣中國以冰養果羹即取其純陰不化水銀等純陰故多養氣輕氣能發火是輕氣即中國所謂陽氣然則西醫言輕養何如中國言陰陽為得其實也使氣味形性不兼論之則一物之功用不全且西人試驗豈古人嘗藥未試耶積陽為天積陰為地陽為氣陰為味人與萬物同一天地即同一陰陽萬物各稟天地之陰陽以變化人身之陰陽藥之功用於是乎著天食人以五氣地食人以五味氣味即陰陽之分見者也陰味出下竅陽氣出上竅清陽發腠理濁陰走五臟清陽實四肢濁陰歸六腑味厚者為陰薄者為陰中之陽氣厚者為陽薄者為陽中之陰味厚則泄薄則通氣薄則發泄厚則發熱元素曰清之清者發腠理清之濁者實四肢濁之濁者歸六腑濁之清者走五臟附子氣厚為陽中之陽大黃味厚為陰中之陰茯苓氣薄為陽中之陰所以利小便入手太陽不離陽之體也麻黃味薄為陰中之陽所以發汗入手太陰不離陰之體也同氣之物或味不同同味之物或氣不同各有厚薄故性用不等李杲曰味之薄者則通酸苦鹹平是也味之厚者則泄鹹苦酸鹹是也氣之厚者發熱辛甘溫熱是也氣之薄者滲泄甘淡平涼是也滲謂小汗泄謂利小便此是辨藥之大法一定而不移者也西醫不言氣味考其用大黃利下用樟腦發熱功用究不離乎氣味特西醫不之解耳辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽六者或收或散或緩或急或潤或燥或軟或堅所以利而行之調其氣使平也發散是能升發外散出汗溫四肢也湧是上吐泄是下利滲泄是利小便六者謂辛甘酸苦鹹淡也宗奭曰生物者氣也成物者味也以奇生則成而耦以耦生則成而奇寒氣堅故其味咸可用以軟熱氣軟故其味苦可用以堅風氣散故其味酸可用以收燥氣收故其味辛可用以散土者沖氣無所不和故其味甘可用以緩用藥之道總調之使平而已宗奭此注深得氣味相反相成之性學者察之附李杲之說曰藥有升降浮沉生長收藏以配四時春升夏浮秋收冬藏土居中化是以味薄者升而生氣薄者降而收氣厚者浮而長味厚者沉而藏氣味平者化而成按味薄者甘平辛平微溫微苦之類是氣薄者甘寒酸平鹹平淡涼之類是氣厚者甘熱辛熱之藥是味厚者苦寒鹹寒之藥是氣味平者得土之性能兼升降也李時珍曰酸鹹無升甘辛無降寒無浮熱無沉其性然也一物之中又有根升梢降生升熱降之不同貴細審焉性味宜忌凡藥之性味各以五行歸五臟而生克好惡具焉故各有宜忌蓋藥得性味之偏所以調五臟之偏勝也偏而得中則病已偏而太過則不宜肝欲散急食辛以散之用辛補之酸瀉之肝木性主散達急而不散則宜辛以散之夫辛是金之味然適得木之性故辛能補肝酸是木之味而反得金收之性故酸能瀉肝心欲軟急食鹹以軟之用鹹補之甘瀉之心為火臟性主柔韌急則剛燥故食鹹以軟之鹹得水味而具火性故入心血甘為土之味火生土則瀉其氣矣脾欲緩急食甘以緩之用苦瀉之甘補之凡性與味皆互換故得木味者得金性得水味者得火性惟土為中氣性味不換得土味者即得土性緩者和也脾急則不和食甘以緩之以甘之本味歸脾能補土也以苦瀉之者甘升苦降味相反而功異也肺欲收急食酸以收之用酸補之辛瀉之肺主秋收之金急則反常故用酸以收之辛則能散其氣也腎欲堅急食鹹以堅之用苦補之咸瀉之腎體沉石欲其堅病則失常惟苦味具寒之性能堅之故以苦補之咸則潤軟故能瀉腎辛走氣氣病毋多食辛鹹走血血病毋多食鹹苦走骨骨病毋多食苦甘走肉肉病毋多食甘酸走筋筋病毋多食酸五臟之本味即能傷及五體總見太過之為病也按照肺肝之例苦亦瀉心酸亦瀉脾而云甘瀉心苦瀉脾總見性味之功用非出於一途也七方十劑七方出於岐伯謂氣有多少形有盛衰治有緩急上下內外之不同故立七方以制之十劑出於北周徐之才謂十種是藥之大體詳之則靡遺失惟十劑內缺寒熱兩端後人又加寒熱二劑足成十二劑醫者但熟七方十劑之法便可以通治百病大方病有兼症邪有強盛非大力不能克之如仲景之大承氣湯大青龍湯一汗一下皆取其分兩重藥味多勝於小承氣小青龍也學者可以類推小方病與兼證邪氣輕淺藥少分兩輕中病而止不傷正氣如仲景小承氣之微下小建中小溫經之微溫小柴胡之微散皆取其中病而止力不太過也余仿此緩方虛延之證剽劫不能成功須緩藥和之有以甘緩之者炙甘草湯四君子湯治虛勞是也有以丸緩之者烏梅丸治久痢是也有多其物以牽制使性不得騁而緩治之者薯蕷丸治風氣百病侯氏黑散填補空竅須服四十九日是也有徐徐服以取效如半夏苦酒煎徐徐呷之甘蜜半夏湯徐徐咽下是也急方病勢急則方求速效如仲景急下之宜大承氣急救之宜四逆湯之類蓋發表欲急則用湯散攻下欲急則用猛峻審定病情合宜而用奇方單方也病有定形藥無牽制意取單鋭見功尤神如仲景少陰病咽痛用豬膚湯後世補虛用獨參湯獨附湯又如五苓五物三物七氣皆以奇數名方七枚五枚等各有意義然奇方總是藥味少而鋭利者也偶方偶對單言單行力孤不如多品力大譬如仲景用桂枝麻黃則發表之加大若單用一味則力弱矣又如桂枝湯單用桂枝而必用生薑以助之是仍存偶之意也腎氣丸桂附同用大建中椒姜同用大承氣硝黃同用皆是此意復方重復之義兩證並見則兩方合用數證相雜則化合數方而為一方也如桂枝二越婢一湯是兩方相合五積散是數方相合又有本方之外別加藥品如調胃承氣湯加連翹薄荷黃芩梔子為涼膈散再加麻黃防風白朮枳殼厚朴為通聖散病之繁重者藥亦繁重也岐伯言奇之不去則偶之是復方乃大劑期於去病矣又云偶之不去則反佐以取之所謂寒熱溫涼反從其病也夫微小寒熱折之可也若大寒熱則必能與異氣相格是以反佐以同其氣復令寒熱參合使其始同終異是七方之外有反佐之法補可扶弱先天不足宜補腎六味丸腎氣丸二仙膠之類是也後天不足宜補脾四君子歸脾湯補中湯之類是也氣弱者宜補肺人參是也血弱者宜補肝當歸是也神弱者宜補心棗仁是也再審陰陽輕重治之則妙於補矣重可鎮怯怯則氣浮重以鎮之有四等驚氣亂宜琥珀至寶丹之類恐氣下宜二加龍骨湯磁珠丸沉香怒氣逆宜生鐵落飲蘆薈丸滾痰丸之類虛氣浮宜安神丸之類其餘代赭石湯風引湯之類皆當推究輕可去實風寒之邪中於人身癰瘡疥痤發於肢體宜輕而揚之使從外解仲景用麻桂今人用人參敗毒散香蘇飲香茹白芷薄荷荊芥之類又小柴胡為和散之總方加減用之可以和營衛而去諸邪當類推焉宣可去壅頭目鼻病牙噤喉塞實痰在胸水火交結氣逆壅滿法宜宣達或嚏或吐或令布散皆謂之宣取嚏如通關散取吐如膽礬甘草薄荷令其布散如越鞠丸逍遙散之類又如四逆散丸氣丸皆是散意通可行滯火氣鬱滯宜用通劑利其小便滯於氣分者用木通滑石六一散之類滯於血分者用防己導赤飲五淋散之類凡味淡者皆利小便得金水之性也凡藥白皮通莖皆利小便象三焦之紋理也泄可去閉邪盛則閉塞必以泄劑從大便奪之備急丸瀉寒實承氣湯瀉熱實葶藶瀉肺湯是泄其氣桃仁承氣湯是泄其血十棗湯泄水祕方化滯丸攻積由此求之凡宜破利者皆泄之類滑可去著著謂留而不去也痰黏喉溺濁淋大腸痢等症皆是宜滑澤以滌之瓜霜冬葵子散榆皮飲痢症三方之類是也澀可固脫脫如開腸洞瀉溺遺精滑大汗亡陽之類宜用澀劑以收斂之理中湯桃花湯止利參耆朮附湯止汗六黃湯止盜汗固精丸天雄散止滑精朮附湯止小便大約牡蠣龍骨海螵蛸其質收澀五味訶子其味收澀蓮房棕灰麻黃根其性收澀隨加寒熱氣血諸品乃為得宜濕可潤燥燥者枯也風熱怫鬱則血液枯竭而為燥病上燥則渴或為肺痿宜人參白虎加花粉瓊玉膏救肺湯下燥則結麻仁丸蓯蓉丸腸燥則膈食宜當歸芝麻丸筋燥則縮攣宜阿膠竹茹湯總之養血則當歸地黃生津則麥冬花粉益精則枸杞菟絲在用者廣求之燥可去濕外感之濕宜神術湯汗之濕泛為痰宜二陳湯降之濕停不溺宜五苓散利之胃濕宜平胃散脾濕宜腎著湯皆治寒濕也又有濕熱之證反忌燥藥當以苦堅清利治之知母防己湯黃柏散相宜寒能勝熱寒熱者證治之太端也熱證如傷寒溫瘧虛癆何一不有當以寒藥治之其間進退出入在人審矣甘寒之劑白虎湯甘露飲之類苦寒之劑金花湯龍膽瀉肝湯之類大抵肺胃肌熱宜銀翹石膏心腹熱宜苓連肝腎熱宜黃柏知母膽草熱可制寒寒者陰氣也積陽生熱能制寒證辛溫之品是矣附子湯附子細辛湯治太陽少陰之寒四逆湯理中湯治脾腎之寒吳萸湯烏梅丸治肝寒青龍湯治肺寒薤白治心胸之寒回陽救急湯統治裡寒桂枝湯統治表寒方難盡録讀書者遍查之內經所載只奇偶兩方仲景之方七法大備雖其時無十劑之說而十劑之法亦寓自北周徐之才作十劑後人又添寒熱二者按證處方可稱精細近出西醫乃謂中國但能用藥不知剖割去病抑知靈素針灸無剜腸剔骨之險有起死回生之妙尤恐術有未精不肯多用且華元化亦有剖割之法據元化所傳中臟經豈能高出內經之上後世不從元化之術固畏其難亦避其險也可知剖割粗工不及針刺之妙而針法微渺不如方藥之詳仲景獨以方藥治病為至當也今人不考針剖與廢之故偶見西醫剖割得效奉為神奇而不知其得失參半也四川某腦後頸上生一瘡俗名對口瘡此係發於督脈督脈上頸貫腦頸之能豎督脈之力也西醫不知剜去其瘡填之以藥謂即生肉其人遂項折不能舉三日而亡陝客某病腹臌西醫破其腹流水兩碗縫之旋愈不久又臌脹又破之連破三次臌脹復發西醫以為不可治夫不知水之何以生而但知放水此西人不講五行之過故人謂西法精而吾謂西法疏也豫曾治總理衙門總辦章京陳君蘭秋名誠肌膚甲錯肉削筋牽陰下久漏小腹微痛大便十日一行脅內難受不可名狀腰內亦然前陰縮小右耳硬腫如石豫曰此腎系生癰連及脅膜下連小腹故時作痛再下穿漏乃內癰之苗也法當治腎係為主陳君勃然起曰西醫亦云病在腰背筋髓內所以割治三次而漏不止無藥可治也大便不利可時服萆麻油故每八九日一服萆麻油今君言與西醫同得無束手無策乎豫曰君在各國衙門習見西人以為西法千古所無不知西人算學出於周髀機器流傳出於般巧墨子醫用剖割亦華元化之流派不必西人果宗數子而其法要不外是中國人未深考乃轉震而驚之可嘆也夫且君病西人知在腰內試問君耳何以硬前陰何以縮大便何以不下西人不能知也陳君曰然前問彼無以對豫曰西人不知腎系即是命門生出板油連網即是三焦腎開竅於二陰故前陰縮而大便祕三焦經繞耳命火位當屬右故見右耳硬腫周身甲錯者腎系三焦內有乾血死膿也按仲景法治之得效大抵西人初創醫法尚多未准故以試驗為衡中國經數聖試驗準確定出形性氣味絲毫不差為最精也即如中國治胃有以參耆益氣者有以花粉生津者有以二術燥土者有以苓半利水者有以姜椒溫中者有以芩連清熱者至於大黃攻胃之積非補胃也西醫補胃之濟用黃連水官桂酒蘇打如無蘇打用牡蠣粉大黃末合用作水早晚服謹按此方寒熱並用總主利降以消食耳西人見食消即以為補胃豈不稍瘥蓋臟腑皮肉西人知其層折經絡氣化西人昧其指歸是以用藥多未合宜豫之此說人或河漢斯言盍取西醫各書考之且安得業算數汽機之人盡如我之談醫去彼之短用彼之長以我之長益彼之短豈不極人事之能而盡造化之量乎有志未逮企豫望之
